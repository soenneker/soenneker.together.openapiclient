                 -F "model=openai/whisper-large-v3"
      operationId: audio-transcriptions
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AudioTranscriptionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AudioTranscriptionResponse'
        '400':
          description: >-
            BadRequest. Possible error codes include `audio_too_long` (audio
            duration exceeds the 4 hour cap), `file_too_large` (URL-fetched
            audio exceeds the 1 GB server-side cap), `unsupported_format` (codec
            or container could not be decoded), and `invalid_params` (request
            parameters failed validation).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
        '413':
          description: >-
            Payload Too Large. The request body exceeded the 500 MB edge limit.
            For larger payloads, host the file and submit an HTTPS URL via the
            `file` field (URL-fetched audio is capped at 1 GB server-side).
          content:
            text/html:
              schema:
                type: string
        '429':
          description: RateLimit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
