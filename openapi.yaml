          items:
            type: string
          type: array
        cpu:
          description: >-
            CPU is the number of CPU cores to allocate per container instance
            (e.g., 0.1 = 100 milli cores)
          minimum: 0.1
          type: number
        description:
          description: >-
            Description is an optional human-readable description of your
            deployment
          type: string
        environment_variables:
          description: >-
            EnvironmentVariables is a list of environment variables to set in
            the container. Replaces all existing environment variables.
          items:
            $ref: '#/components/schemas/EnvironmentVariable'
          type: array
        gpu_count:
          description: GPUCount is the number of GPUs to allocate per container instance
          type: integer
        gpu_type:
          description: GPUType specifies the GPU hardware to use (e.g., "h100-80gb")
          enum:
            - h100-80gb
            - h100-40gb-mig
            - h200-140gb
            - b200-192gb
          type: string
        health_check_path:
          description: >-
            HealthCheckPath is the HTTP path for health checks (e.g.,
            "/health"). Set to empty string to disable health checks
          type: string
        image:
          description: Image is the container image to deploy from registry.together.ai.
          type: string
        max_replicas:
          description: >-
            MaxReplicas is the maximum number of replicas that can be scaled up
            to.
          type: integer
        memory:
          description: >-
            Memory is the amount of RAM to allocate per container instance in
            GiB (e.g., 0.5 = 512MiB)
          maximum: 1000
          type: number
        min_replicas:
          description: MinReplicas is the minimum number of replicas to run
          type: integer
        name:
          description: >-
            Name is the new unique identifier for your deployment. Must contain
            only alphanumeric characters, underscores, or hyphens (1-100
            characters)
          maxLength: 100
          minLength: 1
          type: string
        port:
          description: >-
            Port is the container port your application listens on (e.g., 8080
            for web servers)
          maximum: 65535
          minimum: 1
          type: integer
        storage:
          description: >-
            Storage is the amount of ephemeral disk storage to allocate per
            container instance (e.g., 10 = 10GiB)
          maximum: 400
          type: integer
        termination_grace_period_seconds:
          description: >-
            TerminationGracePeriodSeconds is the time in seconds to wait for
            graceful shutdown before forcefully terminating the replica
          type: integer
        volumes:
          description: >-
            Volumes is a list of volume mounts to attach to the container.
            Replaces all existing volumes.
          items:
            $ref: '#/components/schemas/VolumeMount'
          type: array
      type: object
    UpdateSecretRequest:
      properties:
        description:
          description: >-
            Description is an optional human-readable description of the
            secret's purpose (max 500 characters)
          maxLength: 500
          type: string
        name:
          description: >-
            Name is the new unique identifier for the secret. Can contain
            alphanumeric characters, underscores, hyphens, forward slashes, and
            periods (1-100 characters)
          maxLength: 100
          minLength: 1
          type: string
        project_id:
          description: >-
            ProjectID is ignored - the project is automatically determined from
            your authentication
          type: string
        value:
          description: >-
            Value is the new sensitive data to store securely. Updating this
            replaces the existing secret value.
          minLength: 1
          type: string
      type: object
    UpdateVolumeRequest:
      properties:
        content:
          allOf:
            - $ref: '#/components/schemas/VolumeContentRequest'
          description: Content specifies the new content to preload to this volume.
        name:
          description: Name is the new unique identifier for the volume within the project
          type: string
        type:
          allOf:
            - $ref: '#/components/schemas/VolumeType'
          description: Type is the new volume type (currently only "readOnly" is supported)
      type: object
    VolumeMount:
      properties:
        mount_path:
          description: >-
            MountPath is the path in the container where the volume mounts
            (e.g., "/data").
          type: string
        name:
          description: >-
            Name is the name of the volume to mount. Must reference an existing
            volume by name or ID
          type: string
        version:
          description: >-
            Version is the volume version to mount. On create, defaults to the
            latest version. On update, defaults to the currently mounted
            version.
          type: integer
      required:
        - mount_path
        - name
      type: object
    VolumeResponseItem:
      properties:
        content:
          $ref: '#/components/schemas/VolumeContent'
        created_at:
          description: CreatedAt is the ISO8601 timestamp when this volume was created
          type: string
        current_version:
          description: CurrentVersion is the current version number of this volume
          type: integer
        id:
          description: ID is the unique identifier for this volume
          type: string
        mounted_by:
          description: >-
            MountedBy is the list of deployment IDs currently mounting current
            volume version
          items:
            type: string
          type: array
          uniqueItems: false
        name:
          description: Name is the name of the volume
          type: string
        object:
          description: Object is the type identifier for this response (always "volume")
          type: string
        type:
          $ref: '#/components/schemas/VolumeType'
        updated_at:
          description: UpdatedAt is the ISO8601 timestamp when this volume was last updated
          type: string
        version_history:
          additionalProperties:
            $ref: '#/components/schemas/VersionHistoryItem'
          description: >-
            VersionHistory contains previous versions of this volume, keyed by
            version number
          type: object
      type: object
    VersionHistoryItem:
      properties:
        content:
          $ref: '#/components/schemas/VolumeContentRequest'
        mounted_by:
          items:
            type: string
          type: array
          uniqueItems: false
        version:
          type: integer
      type: object
    VolumeContentRequest:
      description: Content specifies the new content to preload to this volume.
      properties:
        source_prefix:
          description: >-
            SourcePrefix is the file path prefix for the content to be preloaded
            into the volume
          example: models/
          type: string
        type:
          description: >-
            Type is the content type (currently only "files" is supported which
            allows preloading files uploaded via Files API into the volume)
          enum:
            - files
          example: files
          type: string
      type: object
    VolumeContent:
      properties:
        files:
          description: >-
            Files is the list of files to preload into the volume, if the volume
            content type is "files".
          items:
            $ref: '#/components/schemas/FileInfo'
          type: array
          uniqueItems: false
        source_prefix:
          description: >-
            SourcePrefix is the file path prefix for the content to be preloaded
            into the volume
          example: models/
          type: string
        type:
          description: >-
            Type is the content type (currently only "files" is supported which
            allows preloading files uploaded via Files API into the volume)
          enum:
            - files
          example: files
          type: string
      type: object
    FileInfo:
      properties:
        last_modified:
          description: LastModified is the timestamp when the file was last modified
          type: string
        name:
          description: Name is the filename including extension (e.g., "model_weights.bin")
          type: string
        size:
          description: Size is the file size in bytes
          type: integer
      type: object
    VolumeType:
      enum:
        - readOnly
      type: string
      x-enum-varnames:
        - VolumeTypeReadOnly
    QueueError:
      description: Error response returned by queue endpoints.
      properties:
        code:
          description: Machine-readable error code
          type: string
        message:
          description: Human-readable error message
          type: string
        param:
          description: The parameter that caused the error, if applicable
          type: string
        type:
          description: Error category (e.g. "invalid_request_error", "not_found_error")
          type: string
      type: object
    QueueMetricsResponse:
      description: Queue job counts for a model.
      type: object
      required:
        - messages_running
        - messages_waiting
        - total_jobs
      properties:
        messages_running:
          description: Number of jobs currently being processed
          type: integer
        messages_waiting:
          description: Number of jobs waiting to be claimed by a worker
          type: integer
        total_jobs:
          description: Total number of active jobs (waiting + running)
          type: integer
    QueueCancelRequest:
      description: Request to cancel a queued job.
      properties:
        model:
          description: Model identifier the job was submitted to
          type: string
        request_id:
          description: The request ID returned from the submit endpoint
          type: string
      required:
        - model
        - request_id
      type: object
    QueueCancelResponse:
      description: Status returned after a cancel attempt.
      type: object
      required:
        - status
      properties:
        status:
          description: |
            Job status after the cancel attempt. Only pending jobs can be
            canceled. If the job is already running, done, or failed, the status
            is returned unchanged.
          type: string
          enum:
            - canceled
            - running
            - done
            - failed
    QueueClearRequest:
      description: Request to clear pending jobs for a model.
      properties:
        model:
          description: Model identifier whose pending jobs should be canceled
          type: string
      required:
        - model
      type: object
    QueueClearResponse:
      description: Count of pending jobs canceled by the clear operation.
      type: object
      required:
        - canceled_count
      properties:
        canceled_count:
          description: Number of pending jobs that were canceled
          type: integer
    QueueJobRequest:
      description: Request to submit a job to the queue.
      properties:
        info:
          description: |
            Arbitrary JSON metadata stored with the job. Returned in status
            responses, where the model and system may have added or modified
            keys (e.g. progress).
          additionalProperties: true
          type: object
        model:
          description: Required model identifier
          example: my-queue-model
          type: string
        payload:
          description: >-
            Freeform model input. Passed unchanged to the model. Contents are
            model-specific.
          additionalProperties: true
          type: object
        priority:
          default: 0
          description: |
            Job priority. Higher values are processed first (strict priority
            ordering). Jobs with equal priority are processed in submission
            order (FIFO).
          type: integer
      required:
        - model
        - payload
      type: object
    QueueJobResponse:
      description: Response returned after queueing a job.
      properties:
        requestId:
          description: >-
            Unique identifier for the submitted job. Use this to poll status or
            cancel.
          type: string
      required:
        - requestId
      type: object
    QueueJobStatusResponse:
      description: Current status and metadata for a queued job.
      required:
        - request_id
        - model
        - status
      properties:
        claimed_at:
          description: Timestamp when a worker claimed the job
          format: date-time
          type: string
        created_at:
          description: Timestamp when the job was created
          format: date-time
          type: string
        done_at:
          description: Timestamp when the job completed (done or failed)
          format: date-time
          type: string
        info:
          description: |
            Job metadata. Contains keys from the submit request, plus any
            modifications from the model or system (e.g. progress, retry
            history).
          additionalProperties: true
          type: object
        inputs:
          description: Freeform model input, as submitted
          additionalProperties: true
          type: object
        model:
          description: Model identifier the job was submitted to
          type: string
        outputs:
          description: >-
            Freeform model output, populated when the job reaches done status.
            Contents are model-specific.
          additionalProperties: true
          type: object
        priority:
          description: Job priority. Higher values are processed first.
          type: integer
        request_id:
          description: The request ID that was returned from the submit endpoint
          type: string
        retries:
          description: |
            Number of times this job has been retried. Workers set a claim
            timeout and must send periodic status updates to keep the job alive.
            If no update is received within the timeout, the job is returned to
            the queue and retried. After 3 retries the job is permanently
            failed. Jobs explicitly failed by the model are not retried.
          type: integer
        status:
          description: >
            Current job status. Transitions: pending → running → done/failed. A
            pending job may also be canceled.
          enum:
            - pending
            - running
            - done
            - failed
            - canceled
          type: string
        warnings:
          description: Non-fatal messages about the request (e.g. deprecation notices)
          items:
            type: string
          type: array
      type: object
    WhoamiResponse:
      type: object
      required:
        - api_key_id
        - project_id
        - project_name
        - project_slug
        - organization_id
        - organization_name
      properties:
        api_key_id:
          type: string
          description: The ID of the API key that authenticated the request.
        project_id:
          type: string
          description: The ID of the project the API key is scoped to.
        project_name:
          type: string
          description: Human-readable name of the project.
        project_slug:
          type: string
          description: >
            DNS-friendly project identifier. Used with an endpoint slug as
            `<project_slug>/<endpoint_slug>` to form the `model` value in
            dedicated endpoint inference calls.
        organization_id:
          type: string
          description: The ID of the organization that owns the project.
        organization_name:
          type: string
          description: Human-readable name of the organization.
        user_id:
          type: string
          description: The ID of the authenticated user, if available.
