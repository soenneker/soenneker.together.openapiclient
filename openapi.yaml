          label: Audio transcriptions (Python)
          source: >
            # Audio transcription batches use the /v1/audio/transcriptions
            endpoint.

            # Each line in the uploaded JSONL must include `"method": "FILE"` so
            the

            # worker dispatches the request as multipart/form-data. Example
            line:

            #   {"custom_id": "transcription-1", "method": "FILE",

            #    "body": {"file": "https://example.com/audio.wav",

            #             "model": "openai/whisper-large-v3"}}

            from together import Together

            import os


            client = Together(
                api_key=os.environ.get("TOGETHER_API_KEY"),
            )


            batch = client.batches.create(
                input_file_id="file_id",
                endpoint="/v1/audio/transcriptions",
            )


            print(batch.job)
