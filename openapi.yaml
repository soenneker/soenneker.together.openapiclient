            });

            const response = await client.fineTuning.content({
              ft_id: "ft-id",
            });

            console.log(await response.blob());
        - lang: JavaScript
          label: Together AI SDK (JavaScript)
          source: |
            import Together from "together-ai";

            const client = new Together({
