            });
        - lang: Shell
          label: cURL
          source: >
            curl -X DELETE
            "https://api.together.ai/v1/endpoints/endpoint-abc123/adapters" \
                 -H "Authorization: Bearer $TOGETHER_API_KEY" \
                 -H "Content-Type: application/json" \
                 -d '{"model_id": "username/my-endpoint-name:username/my-adapter-model"}'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - model_id
              properties:
                model_id:
                  type: string
                  description: >-
                    Combined identifier in format
                    "endpoint_name:adapter_model_name".
      responses:
        '200':
          description: Adapter successfully unbound
          content:
            application/json:
              schema:
                type: object
                properties:
                  model_id:
                    type: string
                  deleted:
                    type: boolean
        '400':
          description: >-
            Bad Request — invalid model_id format, or adapter not bound to this
            endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
        '403':
          description: Forbidden — adapter model not found or not owned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
        '404':
          description: Not Found — endpoint does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
