          description: >-
            Best validation loss observed, corresponding to
            early_stopping_best_step. Null if no improving evaluation was
            recorded (for example, a non-finite first evaluation).
    FinetuneResponseTruncated:
      type: object
      description: >-
        A truncated version of the fine-tune response, used for POST
        /fine-tunes, GET /fine-tunes and POST /fine-tunes/{id}/cancel endpoints
      required:
        - id
        - status
        - created_at
        - updated_at
        - user_id
      example:
        id: ft-01234567890123456789
        status: completed
        created_at: '2023-05-17T17:35:45.123Z'
        updated_at: '2023-05-17T18:46:23.456Z'
        user_id: user_789xyz012
        owner_address: user@example.com
        total_price: 1500
        token_count: 850000
        events: []
        model: meta-llama/Llama-2-7b-hf
        model_output_name: mynamespace/meta-llama/Llama-2-7b-hf-32162631
        n_epochs: 3
        training_file: file-01234567890123456789
        wandb_project_name: my-finetune-project
      properties:
        id:
          type: string
          description: Unique identifier for the fine-tune job
        status:
          $ref: '#/components/schemas/FinetuneJobStatus'
        created_at:
          type: string
          format: date-time
          description: Creation timestamp of the fine-tune job
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp of the fine-tune job
        started_at:
          type: string
          format: date-time
          description: Start timestamp of the current stage of the fine-tune job
        user_id:
          type: string
          description: ID of the user who created the fine-tune job.
        owner_address:
          type: string
          description: Owner address information
        total_price:
          type: integer
          description: Total price for the fine-tuning job
        token_count:
          type: integer
          description: Count of tokens processed
        events:
          type: array
          items:
            $ref: '#/components/schemas/FineTuneEvent'
          description: Events related to this fine-tune job
        training_file:
          type: string
          description: File-ID of the training file
        validation_file:
          type: string
          description: File-ID of the validation file
        packing:
          type: boolean
          description: Whether sequence packing is being used for training.
        max_seq_length:
          type: integer
          description: >-
            Maximum sequence length to use for training. If not specified, uses
            the maximum allowed for the model and training method.
        model:
          type: string
          description: Base model used for fine-tuning
        model_output_name:
          type: string
        suffix:
          type: string
          description: Suffix added to the fine-tuned model name
        n_epochs:
          type: integer
          description: Number of training epochs
        n_evals:
          type: integer
          description: Number of evaluations during training
        n_checkpoints:
          type: integer
          description: Number of checkpoints saved during training
        batch_size:
          type: integer
          description: Batch size used for training
        training_type:
          oneOf:
            - $ref: '#/components/schemas/FullTrainingType'
            - $ref: '#/components/schemas/LoRATrainingType'
          description: Type of training used (full or LoRA)
        training_method:
          oneOf:
            - $ref: '#/components/schemas/TrainingMethodSFT'
            - $ref: '#/components/schemas/TrainingMethodDPO'
          description: Method of training used
        learning_rate:
          type: number
          description: Learning rate used for training
        lr_scheduler:
          $ref: '#/components/schemas/LRScheduler'
          description: Learning rate scheduler configuration
        warmup_ratio:
          type: number
          description: Ratio of warmup steps
        max_grad_norm:
          type: number
          description: Maximum gradient norm for clipping
        weight_decay:
          type: number
          description: Weight decay value used
        random_seed:
          type: integer
          nullable: true
          description: >
            Random seed used for training. Integer when set; null if not stored
            (e.g. legacy jobs) or no explicit seed was recorded.
        wandb_project_name:
          type: string
          description: Weights & Biases project name
        wandb_name:
          type: string
          description: Weights & Biases run name
        from_checkpoint:
          type: string
          description: Checkpoint used to continue training
        from_hf_model:
          type: string
          description: Hugging Face Hub repo to start training from
        hf_model_revision:
          type: string
          description: The revision of the Hugging Face Hub model to continue training from
        progress:
          $ref: '#/components/schemas/FineTuneProgress'
          description: Progress information for the fine-tuning job
        early_stopped:
          type: boolean
          description: Whether the early-stopping criterion triggered.
        early_stopping_best_step:
          type: integer
          description: >
            Step associated with the selected early-stopping artifact. When
            early_stopping_best_metric is null, no finite best metric was
            recorded; this is the halt step, not a best-checkpoint step.
        early_stopping_best_metric:
          type: number
          nullable: true
          description: >-
            Best validation loss observed, corresponding to
            early_stopping_best_step. Null if no improving evaluation was
            recorded.
    FinetuneDeleteResponse:
      type: object
      properties:
        message:
          type: string
          description: Message indicating the result of the deletion
    FineTunePreviewRequest:
      type: object
      description: Request body for previewing tokenized fine-tuning data.
      required:
        - model
        - training_file
      properties:
        model:
          type: string
          description: >-
            Name of the base model whose tokenizer and chat template will be
            used.
        training_file:
          type: string
          description: File-ID of the uploaded JSONL training file to sample for preview.
        training_method:
          type: string
          default: sft
          enum:
            - sft
          description: >-
            Fine-tuning method to preview. Only supervised fine-tuning is
            currently supported.
        train_on_inputs:
          type: boolean
          default: false
          description: >-
            Whether prompt or user-message tokens should contribute to training
            loss in the preview.
        top_k:
          type: integer
          default: 5
          minimum: 1
          maximum: 50
          description: >-
            Maximum number of rows from the start of the training file to
            tokenize.
    FineTunePreviewResponse:
      type: object
      description: Tokenized preview for sampled rows from a fine-tuning training file.
      required:
        - model
        - dataset_format
        - max_seq_length
        - train_on_inputs
        - rows
      properties:
        model:
          type: string
          description: Name of the base model used to tokenize the sampled rows.
        dataset_format:
          type: string
          enum:
            - general
            - conversation
            - instruction
          description: Detected SFT dataset format for the sampled rows.
        max_seq_length:
          type: integer
          description: Maximum sequence length configured for the requested model.
        train_on_inputs:
          type: boolean
          description: Whether prompt or user-message tokens contribute to training loss.
        rows:
          type: array
          description: >-
            Tokenized preview rows, in the same order as the sampled training
            file rows.
          items:
            $ref: '#/components/schemas/FineTunePreviewRow'
    FineTunePreviewRow:
      type: object
      description: Tokenized representation of one sampled fine-tuning row.
      required:
        - input_ids
        - tokens
        - labels
        - trained_spans
        - num_tokens
        - num_trained_tokens
        - truncated
      properties:
        input_ids:
          type: array
          description: Token IDs produced for the sampled row.
          items:
            type: integer
            description: Token ID from the model tokenizer.
        tokens:
          type: array
          description: Raw token strings produced for the sampled row.
          items:
            type: string
            description: Token text from the model tokenizer.
        labels:
          type: array
          description: Training labels for each token; masked tokens use -100.
          items:
            type: integer
            description: Label value for the token at the same position.
        trained_spans:
          type: array
          description: Half-open token index ranges that contribute to training loss.
          items:
            type: array
            minItems: 2
            maxItems: 2
            description: Start and end token indexes for one trained span.
            items:
              type: integer
              description: Token index in the row.
        num_tokens:
          type: integer
          description: Total number of tokens in the preview row after truncation.
        num_trained_tokens:
          type: integer
          description: Number of tokens in the row that contribute to training loss.
        truncated:
          type: boolean
          description: Whether the row was truncated to the model maximum sequence length.
    FineTunePreviewMessageError:
      type: object
      description: >-
        Error response with a message field returned by the fine-tuning API
        layer.
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable error message.
    FineTunePreviewDetailError:
      type: object
      description: >-
        Error response with a detail field returned by the preview tokenization
        service.
      required:
        - detail
      properties:
        detail:
          type: string
          description: Human-readable error detail.
    FineTuneModelLimits:
      type: object
      description: Model limits for fine-tuning.
      required:
        - model_name
        - lora_training
        - max_num_epochs
        - max_num_evals
        - max_num_checkpoints
        - max_learning_rate
        - min_learning_rate
        - supports_full_training
        - supports_vision
        - supports_tools
        - supports_reasoning
        - merge_output_lora
        - min_max_seq_length
        - max_seq_length_sft
        - max_seq_length_dpo
        - default_gradient_accumulation_steps
      properties:
        model_name:
          type: string
          description: The name of the model.
        full_training:
          type: object
          description: Limits for full training.
          required:
            - max_batch_size
            - max_batch_size_dpo
            - min_batch_size
          properties:
            max_batch_size:
              type: integer
              description: Maximum batch size for SFT full training.
            max_batch_size_dpo:
              type: integer
              description: Maximum batch size for DPO full training.
            min_batch_size:
              type: integer
              description: Minimum batch size for full training.
        lora_training:
          type: object
          description: Limits for LoRA training.
          required:
            - max_batch_size
            - max_batch_size_dpo
            - min_batch_size
            - max_rank
            - target_modules
          properties:
            max_batch_size:
              type: integer
              description: Maximum batch size for SFT LoRA training.
            max_batch_size_dpo:
              type: integer
              description: Maximum batch size for DPO LoRA training.
            min_batch_size:
              type: integer
              description: Minimum batch size for LoRA training.
            max_rank:
              type: integer
              description: Maximum LoRA rank.
            target_modules:
              type: array
              items:
                type: string
              description: Available target modules for LoRA.
        max_num_epochs:
          type: integer
          description: Maximum number of training epochs.
        max_num_evals:
          type: integer
          description: Maximum number of evaluations.
        max_learning_rate:
          type: number
          description: Maximum learning rate.
        min_learning_rate:
          type: number
          description: Minimum learning rate.
        supports_full_training:
          type: boolean
          description: >-
            Whether the model supports full (non-LoRA) fine-tuning. When false,
            only LoRA fine-tuning is available and the full_training limits are
            reported as zero.
        supports_vision:
          type: boolean
          description: Whether the model supports vision/multimodal inputs.
        supports_tools:
          type: boolean
          description: Whether the model supports tool/function calling.
        supports_reasoning:
          type: boolean
          description: Whether the model supports reasoning.
        merge_output_lora:
          type: boolean
          description: >-
            Whether a merged checkpoint (the base model with the trained LoRA
            adapter fused in) is produced for LoRA fine-tunes of this model, in
            addition to the standalone adapter.
        default_gradient_accumulation_steps:
          type: integer
          description: >-
            Default gradient accumulation steps used when a fine-tune request
            omits the value or sets it to 0.
        max_num_checkpoints:
          type: integer
          description: >-
            Maximum number of checkpoints that can be saved during a fine-tuning
            job.
        min_max_seq_length:
          type: integer
          description: Minimum value allowed for the max_seq_length hyperparameter.
        max_seq_length_sft:
          type: integer
          description: Maximum sequence length supported for SFT training.
        max_seq_length_dpo:
          type: integer
          description: Maximum sequence length supported for DPO training.
    FinetuneJobStatus:
      type: string
      enum:
        - pending
        - queued
        - running
        - compressing
        - uploading
        - cancel_requested
        - cancelled
        - error
        - completed
    FinetuneEventLevels:
      type: string
      enum:
        - null
        - info
        - warning
        - error
        - legacy_info
        - legacy_iwarning
        - legacy_ierror
    FinetuneEventType:
      type: string
      enum:
        - job_pending
        - job_start
        - job_stopped
        - model_downloading
        - model_download_complete
        - training_data_downloading
        - training_data_download_complete
        - validation_data_downloading
        - validation_data_download_complete
        - wandb_init
        - training_start
        - checkpoint_save
        - billing_limit
        - epoch_complete
        - training_complete
        - model_compressing
        - model_compression_complete
        - model_uploading
        - model_upload_complete
        - job_complete
        - job_error
        - cancel_requested
        - job_restarted
        - refund
        - warning
        - early_stopped
    FinetuneTruncatedList:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FinetuneResponseTruncated'
    FinetuneListEvents:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FineTuneEvent'
    FineTuneEvent:
      type: object
      required:
        - object
        - created_at
        - message
        - type
      properties:
        object:
          description: The object type, which is always `fine-tune-event`.
          const: fine-tune-event
        created_at:
          type: string
        level:
          anyOf:
            - $ref: '#/components/schemas/FinetuneEventLevels'
        message:
          type: string
        type:
          $ref: '#/components/schemas/FinetuneEventType'
        param_count:
          type: integer
        token_count:
          type: integer
        total_steps:
          type: integer
        wandb_url:
          type: string
        step:
          type: integer
        checkpoint_path:
          type: string
        model_path:
          type: string
        early_stopping_best_step:
          type: integer
          nullable: true
          description: >
            For early_stopped events, the selected best-checkpoint step when a
            finite best metric exists. If early_stopping_best_metric_value is
            null, this is the halt step.
        early_stopping_best_metric_value:
          type: number
          nullable: true
          description: >-
            For early_stopped events, the best validation loss observed. Null if
            no improving evaluation was recorded.
    FineTuneProgress:
      type: object
      description: Progress information for a fine-tuning job
      required:
        - estimate_available
        - seconds_remaining
      properties:
        estimate_available:
          type: boolean
          description: Whether time estimate is available
        seconds_remaining:
          type: integer
          description: >-
            Estimated time remaining in seconds for the fine-tuning job to next
            state
    FinetuneListCheckpoints:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FineTuneCheckpoint'
    FineTuneCheckpoint:
      type: object
      description: A checkpoint available for a fine-tuning job.
      required:
        - step
        - path
        - created_at
        - checkpoint_type
      properties:
        step:
          type: integer
          description: >-
            Step represented by the checkpoint; final checkpoints use the
            shipped model step.
        created_at:
          type: string
          description: Timestamp when the checkpoint was created.
        path:
          type: string
          description: Storage path for the checkpoint artifact.
        checkpoint_type:
          type: string
          description: >-
            Display label for the checkpoint, including the final or
            intermediate checkpoint step.
        checkpoint:
          type: string
          enum:
            - model
            - adapter
          description: Canonical artifact selector for checkpoint download requests.
        object_id:
          type: string
          description: >-
            Together model registry object ID for the checkpoint artifact (e.g.
            `ml_...`).
        object_name:
          type: string
          description: >-
            Together model registry name for the checkpoint artifact, formatted
            as `<project_slug>/<checkpoint_name>`.
        object_revision_id:
          type: string
          description: >-
            Together model registry revision ID for the checkpoint artifact
            (e.g. `rv_...`).
    FullTrainingType:
      type: object
      properties:
        type:
          type: string
          enum:
            - Full
      required:
        - type
    LoRATrainingType:
      type: object
      properties:
        type:
          type: string
          enum:
            - Lora
        lora_r:
          type: integer
        lora_alpha:
          type: integer
        lora_dropout:
          type: number
          default: 0
        lora_trainable_modules:
          type: string
          default: all-linear
          description: >-
            Comma-separated LoRA target modules. Use `all-linear` for model
            defaults; MoE expert modules (`w_up`, `w_gate`, `w_down`) are
            supported on compatible models and cannot be mixed with attention
            modules.
      required:
        - type
        - lora_r
        - lora_alpha
    TrainingMethodSFT:
      type: object
      properties:
        method:
          type: string
          enum:
            - sft
        train_on_inputs:
          oneOf:
            - type: boolean
            - type: string
              enum:
                - auto
          type: boolean
          default: auto
          description: >-
            Whether to mask user messages in conversational data or prompts in
            instruction data.
      required:
        - method
        - train_on_inputs
    TrainingMethodDPO:
      type: object
      properties:
        method:
          type: string
          enum:
            - dpo
        dpo_beta:
          type: number
          default: 0.1
        rpo_alpha:
          type: number
          default: 0
        dpo_normalize_logratios_by_length:
          type: boolean
          default: false
        dpo_reference_free:
          type: boolean
          default: false
        simpo_gamma:
          type: number
          default: 0
      required:
        - method
    MultimodalParams:
      type: object
      properties:
        train_vision:
          type: boolean
          description: >-
            Whether to train the vision encoder of the model. Only available for
            multimodal models.
    LRScheduler:
      type: object
      properties:
        lr_scheduler_type:
          type: string
          enum:
            - linear
            - cosine
        lr_scheduler_args:
          oneOf:
            - $ref: '#/components/schemas/LinearLRSchedulerArgs'
            - $ref: '#/components/schemas/CosineLRSchedulerArgs'
      required:
        - lr_scheduler_type
    CosineLRSchedulerArgs:
      type: object
      properties:
        min_lr_ratio:
          type: number
          default: 0
          description: The ratio of the final learning rate to the peak learning rate
        num_cycles:
          type: number
          default: 0.5
          description: Number or fraction of cycles for the cosine learning rate scheduler
      required:
        - min_lr_ratio
        - num_cycles
    LinearLRSchedulerArgs:
      type: object
      properties:
        min_lr_ratio:
          type: number
          default: 0
          description: The ratio of the final learning rate to the peak learning rate
    Autoscaling:
      type: object
      description: Configuration for automatic scaling of replicas based on demand.
      required:
        - min_replicas
        - max_replicas
      properties:
        min_replicas:
          type: integer
          description: >-
            The minimum number of replicas to maintain, even when there is no
            load
          examples:
            - 2
        max_replicas:
          type: integer
          description: The maximum number of replicas to scale up to under load
          examples:
            - 5
    HardwareSpec:
      type: object
      description: Detailed specifications of a hardware configuration
      required:
        - gpu_type
        - gpu_link
        - gpu_memory
        - gpu_count
      properties:
        gpu_type:
          type: string
          description: The type/model of GPU
          examples:
            - a100-80gb
        gpu_link:
          type: string
          description: The GPU interconnect technology
          examples:
            - sxm
        gpu_memory:
          type: number
          description: Amount of GPU memory in GB
          examples:
            - 80
        gpu_count:
          type: integer
          description: Number of GPUs in this configuration
          examples:
            - 2
    EndpointPricing:
      type: object
      description: Pricing details for using an endpoint
      required:
        - cents_per_minute
      properties:
        cents_per_minute:
          type: number
          description: Cost per minute of endpoint uptime in cents
          examples:
            - 5.42
    HardwareAvailability:
      type: object
      description: Indicates the current availability status of a hardware configuration
      required:
        - status
      properties:
        status:
          type: string
          description: The availability status of the hardware configuration
          enum:
            - available
            - unavailable
            - insufficient
    HardwareWithStatus:
      type: object
      description: Hardware configuration details with optional availability status
      required:
        - object
        - id
        - pricing
        - specs
        - updated_at
      properties:
        object:
          description: The object type, which is always `hardware`.
          const: hardware
        id:
          type: string
          description: Unique identifier for the hardware configuration
          examples:
            - 2x_nvidia_a100_80gb_sxm
        pricing:
          $ref: '#/components/schemas/EndpointPricing'
        specs:
          $ref: '#/components/schemas/HardwareSpec'
        availability:
          $ref: '#/components/schemas/HardwareAvailability'
        updated_at:
          type: string
          format: date-time
          description: Timestamp of when the hardware status was last updated
    CreateEndpointRequest:
      type: object
      required:
        - model
        - hardware
        - autoscaling
      properties:
        display_name:
          type: string
          description: A human-readable name for the endpoint
          example: My Llama3 70b endpoint
        model:
          type: string
          description: The model to deploy on this endpoint
          example: deepseek-ai/DeepSeek-R1
        hardware:
          type: string
          description: The hardware configuration to use for this endpoint
          example: 1x_nvidia_a100_80gb_sxm
        autoscaling:
          $ref: '#/components/schemas/Autoscaling'
          description: Configuration for automatic scaling of the endpoint
        disable_prompt_cache:
          deprecated: true
          type: boolean
          description: This parameter is deprecated and no longer has any effect.
          default: false
        disable_speculative_decoding:
          type: boolean
          description: Whether to disable speculative decoding for this endpoint
          default: false
        state:
          type: string
          description: The desired state of the endpoint
          enum:
            - STARTED
            - STOPPED
          default: STARTED
          example: STARTED
        inactive_timeout:
          type: integer
          description: >-
            The number of minutes of inactivity after which the endpoint stops
            automatically. Set to null, omit, or set to 0 to disable automatic
            timeout.
          nullable: true
          example: 60
        availability_zone:
          type: string
          description: >-
            Create the endpoint in a specified availability zone (e.g.,
            us-central-4b)
    DedicatedEndpoint:
      type: object
      description: Details about a dedicated endpoint deployment
      required:
        - object
        - id
        - name
        - display_name
        - model
        - hardware
        - type
        - owner
        - state
        - autoscaling
        - created_at
      properties:
        object:
          description: The object type, which is always `endpoint`.
          const: endpoint
        id:
          type: string
          description: Unique identifier for the endpoint
          example: endpoint-d23901de-ef8f-44bf-b3e7-de9c1ca8f2d7
        name:
          type: string
          description: System name for the endpoint
          example: devuser/deepseek-ai/DeepSeek-R1-a32b82a1
        display_name:
          type: string
          description: Human-readable name for the endpoint
          example: My DeepSeek R1 endpoint
        model:
          type: string
          description: The model deployed on this endpoint
          example: deepseek-ai/DeepSeek-R1
        hardware:
          type: string
          description: The hardware configuration used for this endpoint
          example: 8x_nvidia_h200_140gb_sxm
        type:
          type: string
          enum:
            - dedicated
          description: The type of endpoint
          example: dedicated
        owner:
          type: string
          description: The owner of this endpoint
          example: devuser
        state:
          type: string
          enum:
            - PENDING
            - STARTING
            - STARTED
            - STOPPING
            - STOPPED
            - ERROR
          description: Current state of the endpoint
          example: STARTED
        autoscaling:
          $ref: '#/components/schemas/Autoscaling'
          description: Configuration for automatic scaling of the endpoint
        created_at:
          type: string
          format: date-time
          description: Timestamp when the endpoint was created
          example: 2025-02-04T10:43:55.405Z
    ListEndpoint:
      type: object
      description: Details about an endpoint when listed via the list endpoint
      required:
        - id
        - object
        - name
        - model
        - type
        - owner
        - state
        - created_at
      properties:
        object:
          description: The object type, which is always `endpoint`.
          const: endpoint
        id:
          type: string
          description: Unique identifier for the endpoint
          example: endpoint-d23901de-ef8f-44bf-b3e7-de9c1ca8f2d7
        name:
          type: string
          description: System name for the endpoint
          example: allenai/OLMo-7B
        model:
          type: string
          description: The model deployed on this endpoint
          example: allenai/OLMo-7B
        type:
          type: string
          enum:
            - serverless
            - dedicated
          description: The type of endpoint
          example: serverless
        owner:
          type: string
          description: The owner of this endpoint
          example: together
        state:
          type: string
          enum:
            - PENDING
            - STARTING
            - STARTED
            - STOPPING
            - STOPPED
            - ERROR
          description: Current state of the endpoint
          example: STARTED
        created_at:
          type: string
          format: date-time
          description: Timestamp when the endpoint was created
          example: 2024-02-28T21:34:35.444Z
    DisplayorExecuteOutput:
      properties:
        data:
          properties:
            application/geo+json:
              type: object
            application/javascript:
              type: string
            application/json:
              type: object
            application/pdf:
              format: byte
              type: string
            application/vnd.vega.v5+json:
              type: object
            application/vnd.vegalite.v4+json:
              type: object
            image/gif:
              format: byte
              type: string
            image/jpeg:
              format: byte
              type: string
            image/png:
              format: byte
              type: string
            image/svg+xml:
              type: string
            text/html:
              type: string
            text/latex:
              type: string
            text/markdown:
              type: string
            text/plain:
              type: string
          type: object
        type:
          enum:
            - display_data
            - execute_result
          type: string
      required:
        - type
        - data
      title: DisplayorExecuteOutput
    Error:
      oneOf:
        - type: string
        - additionalProperties: true
          type: object
      title: Error
    ErrorOutput:
      title: ErrorOutput
      description: >-
        Errors and exceptions that occurred. If this output type is present,
        your code did not execute successfully.
      properties:
        data:
          type: string
        type:
          enum:
            - error
          type: string
      required:
        - type
        - data
    ExecuteRequest:
      title: ExecuteRequest
      required:
        - language
        - code
      properties:
        code:
          description: Code snippet to execute.
          example: print('Hello, world!')
          type: string
        files:
          description: >-
            Files to upload to the session. If present, files are uploaded
            before executing the given code.
          items:
            properties:
              content:
                type: string
              encoding:
                description: >-
                  Encoding of the file content. Use `string` for text files such
                  as code, and `base64` for binary files, such as images.
                enum:
                  - string
                  - base64
                type: string
              name:
                type: string
            required:
              - name
              - encoding
              - content
            type: object
          type: array
        language:
          default: python
          description: >-
            Programming language for the code to execute. Currently only
            supports Python.
          enum:
            - python
        session_id:
          description: >-
            Identifier of the current session. Used to make follow-up calls.
            Returns an error if the session does not belong to the caller or has
            expired.
          example: ses_abcDEF123
          nullable: false
          type: string
    ExecuteResponse:
      title: ExecuteResponse
      type: object
      description: >-
        The result of the execution. If successful, `data` contains the result
        and `errors` is null. If unsuccessful, `data` is null and `errors`
        contains the errors.
      oneOf:
        - title: SuccessfulExecution
          type: object
          required:
            - data
            - errors
          properties:
            errors:
              type: 'null'
            data:
              type: object
              nullable: false
              required:
                - session_id
                - outputs
              properties:
                outputs:
                  type: array
                  items:
                    discriminator:
                      propertyName: type
                    oneOf:
                      - title: StreamOutput
                        description: Outputs that were printed to stdout or stderr
                        type: object
                        required:
                          - type
                          - data
                        properties:
                          type:
                            enum:
                              - stdout
                              - stderr
                            type: string
                          data:
                            type: string
                      - description: >-
                          Errors and exceptions that occurred. If this output
                          type is present, your code did not execute
                          successfully.
                        properties:
                          data:
                            type: string
                          type:
                            enum:
                              - error
                            type: string
                        required:
                          - type
                          - data
                        title: ErrorOutput
                      - properties:
                          data:
                            properties:
                              application/geo+json:
                                type: object
                                additionalProperties: true
                              application/javascript:
                                type: string
                              application/json:
                                type: object
                                additionalProperties: true
                              application/pdf:
                                format: byte
                                type: string
                              application/vnd.vega.v5+json:
                                type: object
                                additionalProperties: true
                              application/vnd.vegalite.v4+json:
                                type: object
                                additionalProperties: true
                              image/gif:
                                format: byte
                                type: string
                              image/jpeg:
                                format: byte
                                type: string
                              image/png:
                                format: byte
                                type: string
                              image/svg+xml:
                                type: string
                              text/html:
                                type: string
                              text/latex:
                                type: string
                              text/markdown:
                                type: string
                              text/plain:
                                type: string
                            type: object
                          type:
                            enum:
                              - display_data
                              - execute_result
                            type: string
                        required:
                          - type
                          - data
                        title: DisplayorExecuteOutput
                    title: InterpreterOutput
                session_id:
                  type: string
                  description: >-
                    Identifier of the current session. Used to make follow-up
                    calls.
                  example: ses_abcDEF123
                  nullable: false
                status:
                  type: string
                  enum:
                    - success
                  description: Status of the execution. Currently only supports success.
        - title: FailedExecution
          type: object
          required:
            - data
            - errors
          properties:
            data:
              type: 'null'
            errors:
              type: array
              items:
                title: Error
                oneOf:
                  - type: string
                  - type: object
                    additionalProperties: true
    InterpreterOutput:
      discriminator:
        propertyName: type
      oneOf:
        - description: Outputs that were printed to stdout or stderr
          properties:
            data:
              type: string
            type:
              enum:
                - stdout
                - stderr
              type: string
          required:
            - type
            - data
          title: StreamOutput
        - description: >-
            Errors and exceptions that occurred. If this output type is present,
            your code did not execute successfully.
          properties:
            data:
              type: string
            type:
              enum:
                - error
              type: string
          required:
            - type
            - data
          title: ErrorOutput
        - properties:
            data:
              properties:
                application/geo+json:
                  type: object
                application/javascript:
                  type: string
                application/json:
                  type: object
                application/pdf:
                  format: byte
                  type: string
                application/vnd.vega.v5+json:
                  type: object
                application/vnd.vegalite.v4+json:
                  type: object
                image/gif:
                  format: byte
                  type: string
                image/jpeg:
                  format: byte
                  type: string
                image/png:
                  format: byte
                  type: string
                image/svg+xml:
                  type: string
                text/html:
                  type: string
                text/latex:
                  type: string
                text/markdown:
                  type: string
                text/plain:
                  type: string
              type: object
            type:
              enum:
                - display_data
                - execute_result
              type: string
          required:
            - type
            - data
          title: DisplayorExecuteOutput
      title: InterpreterOutput
    Response:
      properties:
        errors:
          items:
            oneOf:
              - type: string
              - additionalProperties: true
                type: object
            title: Error
          type: array
      title: Response
      type: object
    SessionListResponse:
      allOf:
        - properties:
            errors:
              items:
                oneOf:
                  - type: string
                  - additionalProperties: true
                    type: object
                title: Error
              type: array
          title: Response
          type: object
        - properties:
            data:
              properties:
                sessions:
                  items:
                    properties:
                      execute_count:
                        type: integer
                      expires_at:
                        format: date-time
                        type: string
                      id:
                        description: Session Identifier. Used to make follow-up calls.
                        example: ses_abcDEF123
                        type: string
                      last_execute_at:
                        format: date-time
                        type: string
                      started_at:
                        format: date-time
                        type: string
                    required:
                      - execute_count
                      - expires_at
                      - id
                      - last_execute_at
                      - started_at
                    type: object
                  type: array
              required:
                - sessions
          type: object
      title: SessionListResponse
      type: object
    StreamOutput:
      description: Outputs that were printed to stdout or stderr
      properties:
        data:
          type: string
        type:
          enum:
            - stdout
            - stderr
          type: string
      required:
        - type
        - data
      title: StreamOutput
    CreateBatchRequest:
      type: object
      required:
        - endpoint
        - input_file_id
      properties:
        endpoint:
          type: string
          enum:
            - /v1/chat/completions
            - /v1/audio/transcriptions
            - /v1/audio/translations
          description: >
            The endpoint to use for batch processing. Each line of the uploaded
            input file is dispatched against this endpoint.

            - `/v1/chat/completions` — chat completion batches

            - `/v1/audio/transcriptions` — audio transcription batches (e.g.
            `openai/whisper-large-v3`)

            - `/v1/audio/translations` — audio translation batches
          example: /v1/chat/completions
        input_file_id:
          type: string
          description: ID of the uploaded input file containing batch requests
          example: file-abc123def456ghi789
        completion_window:
          type: string
          description: Time window for batch completion (optional)
          example: 24h
        priority:
          type: integer
          description: Priority for batch processing (optional)
          example: 1
        model_id:
          type: string
          description: Model to use for processing batch requests
          example: Qwen/Qwen3.5-9B
    BatchErrorResponse:
      type: object
      properties:
        error:
          type: string
    BatchJobWithWarning:
      type: object
      properties:
        job:
          $ref: '#/components/schemas/BatchJob'
        warning:
          type: string
    BatchJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 01234567-8901-2345-6789-012345678901
        user_id:
          type: string
          example: user_789xyz012
        input_file_id:
          type: string
          example: file-input123abc456def
        file_size_bytes:
          type: integer
          example: 1048576
          description: Size of input file in bytes
        status:
          $ref: '#/components/schemas/BatchJobStatus'
        job_deadline:
          type: string
          format: date-time
          example: '2024-01-15T15:30:00Z'
        created_at:
          type: string
          format: date-time
          example: '2024-01-15T14:30:00Z'
        endpoint:
          type: string
          example: /v1/chat/completions
        progress:
          type: number
          example: 75
          description: Completion progress (0.0 to 100)
        model_id:
          type: string
          example: Qwen/Qwen3.5-9B
          description: Model used for processing requests
        output_file_id:
          type: string
          example: file-output789xyz012ghi
        error_file_id:
          type: string
          example: file-errors456def789jkl
        error:
          type: string
        completed_at:
          type: string
          format: date-time
          example: '2024-01-15T15:45:30Z'
    BatchJobStatus:
      type: string
      enum:
        - VALIDATING
        - IN_PROGRESS
        - COMPLETED
        - FAILED
        - EXPIRED
        - CANCELLED
      example: IN_PROGRESS
      description: Current status of the batch job
    EvaluationTypedRequest:
      type: object
      required:
        - type
        - parameters
      properties:
        type:
          type: string
          enum:
            - classify
            - score
            - compare
          description: The type of evaluation to perform
          example: classify
        parameters:
          oneOf:
            - $ref: '#/components/schemas/EvaluationClassifyParameters'
            - $ref: '#/components/schemas/EvaluationScoreParameters'
            - $ref: '#/components/schemas/EvaluationCompareParameters'
          description: Type-specific parameters for the evaluation
    EvaluationClassifyParameters:
      type: object
      required:
        - judge
        - labels
        - pass_labels
        - input_data_file_path
      properties:
        judge:
          $ref: '#/components/schemas/EvaluationJudgeModelConfig'
        labels:
          type: array
          items:
            type: string
          minItems: 2
          description: List of possible classification labels
          example:
            - 'yes'
            - 'no'
        pass_labels:
          type: array
          items:
            type: string
          minItems: 1
          description: List of labels that are considered passing
          example:
            - 'yes'
        model_to_evaluate:
          $ref: '#/components/schemas/EvaluationModelOrString'
        input_data_file_path:
          type: string
          description: Data file ID
          example: file-1234-aefd
    EvaluationScoreParameters:
      type: object
      required:
        - judge
        - min_score
        - max_score
        - pass_threshold
        - input_data_file_path
      properties:
        judge:
          $ref: '#/components/schemas/EvaluationJudgeModelConfig'
        min_score:
          type: number
          example: 0
          description: Minimum possible score
        max_score:
          type: number
          example: 10
          description: Maximum possible score
        pass_threshold:
          type: number
          example: 7
          description: Score threshold for passing
        model_to_evaluate:
          $ref: '#/components/schemas/EvaluationModelOrString'
        input_data_file_path:
          type: string
          example: file-01234567890123456789
          description: Data file ID
    EvaluationCompareParameters:
      type: object
      required:
        - judge
        - input_data_file_path
      properties:
        judge:
          $ref: '#/components/schemas/EvaluationJudgeModelConfig'
        model_a:
          description: >
            Either an EvaluationModelRequest for generation or a string column
            name from the dataset (when responses are pre-generated). When both
            model_a and model_b are EvaluationModelRequest objects, their
            inference runs execute in parallel to reduce total wall-clock time.
          oneOf:
            - $ref: '#/components/schemas/EvaluationModelRequest'
            - type: string
              description: Column name in the input data containing pre-generated responses
        model_b:
          description: >
            Either an EvaluationModelRequest for generation or a string column
            name from the dataset (when responses are pre-generated). When both
            model_a and model_b are EvaluationModelRequest objects, their
            inference runs execute in parallel to reduce total wall-clock time.
          oneOf:
            - $ref: '#/components/schemas/EvaluationModelRequest'
            - type: string
              description: Column name in the input data containing pre-generated responses
        input_data_file_path:
          type: string
          description: Data file ID
          example: file-01234567890123456789
        disable_position_bias_correction:
          type: boolean
          default: false
          description: >
            When false (default), the judge runs twice per sample: once with
            model A's response first (original order) and once with model B's
            response first (flipped order). The two verdicts are reconciled to
            cancel out position bias. When true, only the original-order pass is
            run, halving judge cost and latency at the expense of position-bias
            correction. The result file will not contain flipped-order judge
            fields when this is true.
    EvaluationJudgeModelConfig:
      type: object
      required:
        - model
        - system_template
        - model_source
      properties:
        model:
          type: string
          description: Name of the judge model
          example: Qwen/Qwen3.5-9B
        system_template:
          type: string
          description: System prompt template for the judge
          example: Imagine you are a helpful assistant
        model_source:
          type: string
          description: >
            Source of the judge model inference: - `serverless`: Together's
            shared serverless inference API. Default concurrency: 25 workers. -
            `dedicated`: A Together dedicated deployment endpoint. Default
            concurrency: 5 workers
              (minimum enforced even if num_workers is set lower).
            - `external`: An external inference API (e.g. OpenAI, Anthropic,
            Google, OpenRouter).
              Requires `external_api_token` and `external_base_url`. Default concurrency: 2 workers
              for first-party APIs, 20 for proxy/aggregator endpoints.
          enum:
            - serverless
            - dedicated
            - external
        external_api_token:
          type: string
          description: >-
            Bearer/API token for the external judge model provider. Required
            when model_source is 'external'.
        external_base_url:
          type: string
          description: >-
            Base URL of the external inference API for the judge. Must be
            OpenAI-compatible. Required when model_source is 'external'.
        num_workers:
          type: integer
          minimum: 1
          description: >
            Number of concurrent inference workers for the judge. Overrides the
            source-specific default (serverless: 25, dedicated: 5, external:
            2–20). For dedicated endpoints the value is clamped to a minimum of
            5 regardless of what is set here.
          example: 5
        max_tokens:
          type: integer
          minimum: 1
          description: >-
            Maximum number of tokens the judge model may generate. Defaults to
            32768 if omitted. Set higher for reasoning judges (e.g. o-series,
            Gemini) that spend tokens on internal chain-of-thought before
            emitting the verdict JSON.
          example: 8192
        temperature:
          type: number
          minimum: 0
          maximum: 2
          description: >-
            Sampling temperature for the judge model. Defaults to 0.05 if
            omitted.
          example: 0
    EvaluationModelOrString:
      oneOf:
        - type: string
          description: Column name in the input dataset containing pre-generated responses
        - $ref: '#/components/schemas/EvaluationModelRequest'
    EvaluationModelRequest:
      type: object
      required:
        - model
        - max_tokens
        - temperature
        - system_template
        - input_template
        - model_source
      properties:
        model:
          type: string
          description: Name of the model to evaluate
          example: Qwen/Qwen3.5-9B
        max_tokens:
          type: integer
          minimum: 1
          description: Maximum number of tokens to generate.
          example: 512
        temperature:
          type: number
          minimum: 0
          maximum: 2
          description: Sampling temperature for generation.
          example: 0.7
        system_template:
          type: string
          description: >-
            System prompt template. Supports Jinja2 variables referencing
            dataset columns.
          example: You are a helpful assistant.
        input_template:
          type: string
          description: >-
            User message template. Supports Jinja2 variables referencing dataset
            columns.
          example: 'Please answer the following question: {{ question }}'
        model_source:
          type: string
          description: >
            Source of the model inference: - `serverless`: Together's shared
            serverless inference API. Default concurrency: 25 workers. -
            `dedicated`: A Together dedicated deployment endpoint. Default
            concurrency: 5 workers
              (minimum enforced even if num_workers is set lower). Authentication uses the requesting
              user's Together API token automatically.
            - `external`: An external inference API (e.g. OpenAI, Anthropic,
            Google, OpenRouter).
              Requires `external_api_token` and `external_base_url`. Default concurrency: 2 workers
              for first-party APIs (OpenAI, Anthropic, Google), 20 for proxy/aggregator endpoints.
          enum:
            - serverless
            - dedicated
            - external
        external_api_token:
          type: string
          description: >-
            Bearer/API token for the external model provider. Required when
            model_source is 'external'.
        external_base_url:
          type: string
          description: >-
            Base URL of the external inference API. Must be OpenAI-compatible.
            Required when model_source is 'external'.
        num_workers:
          type: integer
          minimum: 1
          description: >
            Number of concurrent inference workers. Overrides the
            source-specific default (serverless: 25, dedicated: 5, external:
            2–20). For dedicated endpoints the value is clamped to a minimum of
            5 regardless of what is set here.
          example: 5
    EvaluationResponse:
      type: object
      properties:
        workflow_id:
          type: string
          description: The ID of the created evaluation job
          example: eval-1234-1244513
        status:
          type: string
          enum:
            - pending
          description: Initial status of the job
    EvaluationJob:
      type: object
      properties:
        workflow_id:
          type: string
          description: The evaluation job ID
          example: eval-1234aedf
        type:
          type: string
          enum:
            - classify
            - score
            - compare
          description: The type of evaluation
          example: classify
        owner_id:
          type: string
          description: ID of the job owner (admin only)
        status:
          type: string
          enum:
            - pending
            - queued
            - running
            - completed
            - error
            - user_error
          description: Current status of the job
          example: completed
        status_updates:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationJobStatusUpdate'
          description: History of status updates (admin only)
        parameters:
          type: object
          description: The parameters used for this evaluation
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          description: When the job was created
          example: '2025-07-23T17:10:04.837888Z'
        updated_at:
          type: string
          format: date-time
          description: When the job was last updated
          example: '2025-07-23T17:10:04.837888Z'
        results:
          oneOf:
            - $ref: '#/components/schemas/EvaluationClassifyResults'
            - $ref: '#/components/schemas/EvaluationScoreResults'
            - $ref: '#/components/schemas/EvaluationCompareResults'
            - type: object
              properties:
                error:
                  type: string
          nullable: true
          description: Results of the evaluation (when completed)
    EvaluationJobStatusUpdate:
      type: object
      properties:
        status:
          type: string
          description: The status at this update
          example: pending
        message:
          type: string
          description: Additional message for this update
          example: Job is pending evaluation
        timestamp:
          type: string
          format: date-time
          description: When this update occurred
          example: '2025-07-23T17:10:04.837888Z'
    EvaluationClassifyResults:
      type: object
      properties:
        generation_fail_count:
          type: number
          nullable: true
          description: Number of failed generations.
          example: 0
        judge_fail_count:
          type: number
          nullable: true
          description: Number of failed judge generations
          example: 0
        invalid_label_count:
          type: number
          nullable: true
          description: Number of invalid labels
          example: 0
        result_file_id:
          type: string
          description: Data File ID
          example: file-1234-aefd
        pass_percentage:
          type: number
          nullable: true
          description: Pecentage of pass labels.
          example: 10
        label_counts:
          type: string
          description: JSON string representing label counts
          example: '{"yes": 10, "no": 0}'
    EvaluationScoreResults:
      type: object
      properties:
        aggregated_scores:
          type: object
          properties:
            mean_score:
              type: number
            std_score:
              type: number
            pass_percentage:
              type: number
        generation_fail_count:
          type: number
          nullable: true
          description: Number of failed generations.
          example: 0
        judge_fail_count:
          type: number
          nullable: true
          description: Number of failed judge generations
          example: 0
        invalid_score_count:
          type: number
          description: number of invalid scores generated from model
        failed_samples:
          type: number
          description: number of failed samples generated from model
        result_file_id:
          type: string
          description: Data File ID
          example: file-1234-aefd
    EvaluationCompareResults:
      type: object
      properties:
        A_wins:
          type: integer
          description: Number of samples where model A was judged the winner
        B_wins:
          type: integer
          description: Number of samples where model B was judged the winner
        Ties:
          type: integer
          description: Number of samples that resulted in a tie score
        generation_fail_count:
          type: number
          nullable: true
          description: Number of generation failures across model A and model B.
          example: 0
        judge_fail_count:
          type: number
          nullable: true
          description: >
            Number of judge inference failures. In the default two-pass mode
            (disable_position_bias_correction=false) this is the combined
            failure count from both the original-order and flipped-order judge
            passes.
          example: 0
        result_file_id:
          type: string
          description: >
            File ID of the detailed output file. Each row contains the original
            input fields plus judge outputs. In two-pass mode the file includes
            both original-order and flipped-order judge fields; in single-pass
            mode (disable_position_bias_correction=true) only original-order
            fields are present.
    AudioFileBinary:
      type: string
      format: binary
      description: >-
        Audio file uploaded as binary. Maximum upload size 500 MB (requests
        above this are rejected at the edge with HTTP 413). For larger payloads,
        host the file and submit a URL instead.
    AudioFileUrl:
      type: string
      format: uri
      description: >-
        Public HTTPS URL the server fetches the audio from. Server-side fetch
        limit is 1 GB; downloads exceeding the cap fail with `file_too_large`.
    CreateVideoBody:
      title: Create video request
      description: Parameters for creating a new video generation job.
      type: object
      required:
        - model
      properties:
        model:
          type: string
          description: The model to be used for the video creation request.
        prompt:
          type: string
          maxLength: 32000
          minLength: 1
          description: Text prompt that describes the video to generate.
        height:
          type: integer
        width:
          type: integer
        resolution:
          type: string
          description: Video resolution.
        ratio:
          type: string
          description: Aspect ratio of the video.
        seconds:
          type: string
          description: Clip duration in seconds.
        fps:
          type: integer
          description: Frames per second. Defaults to 24.
        steps:
          type: integer
          minimum: 10
          maximum: 50
          description: >-
            The number of denoising steps the model performs during video
            generation. More steps typically result in higher quality output but
            require longer processing time.
        seed:
          type: integer
          description: >-
            Seed to use in initializing the video generation.  Using the same
            seed allows deterministic video generation.  If not provided a
            random seed is generated for each request.
        guidance_scale:
          type: integer
          description: "Controls how closely the video generation follows your prompt. Higher values make the model adhere more strictly to your text description, while lower values allow more creative freedom.\_guidence_scale\_affects both visual content and temporal consistency.Recommended range is 6.0-10.0 for most video models. Values above 12 may cause over-guidance artifacts or unnatural motion patterns."
        output_format:
          $ref: '#/components/schemas/VideoOutputFormat'
          description: Specifies the format of the output video. Defaults to MP4.
        output_quality:
          type: integer
          description: Compression quality. Defaults to 20.
        negative_prompt:
          type: string
          description: >-
            Similar to prompt, but specifies what to avoid instead of what to
            include
        generate_audio:
          type: boolean
          description: Whether to generate audio for the video.
        media:
          $ref: '#/components/schemas/VideoMedia'
          description: >-
            Media inputs for video generation. The accepted fields depend on the
            model type (e.g. i2v, r2v, t2v, videoedit).
        frame_images:
          deprecated: true
          description: >-
            Deprecated: use media.frame_images instead. Array of images to guide
            video generation, similar to keyframes.
          example:
            - - input_image: aac49721-1964-481a-ae78-8a4e29b91402
                frame: 0
              - input_image: c00abf5f-6cdb-4642-a01d-1bfff7bc3cf7
                frame: 48
              - input_image: 3ad204c3-a9de-4963-8a1a-c3911e3afafe
                frame: last
          type: array
          items:
            $ref: '#/components/schemas/VideoFrameImageInput'
        reference_images:
          deprecated: true
          description: >-
            Deprecated: use media.reference_images instead. Unlike frame_images
            which constrain specific timeline positions, reference images guide
            the general appearance that should appear consistently across the
            video.
          type: array
          items:
            type: string
    VideoStatus:
      description: Current lifecycle status of the video job.
      type: string
      enum:
        - in_progress
        - completed
        - failed
    VideoFrameImageInput:
      type: object
      required:
        - input_image
      properties:
        input_image:
          type: string
          description: URL path to hosted image that is used for a frame
        frame:
          description: >
            Optional param to specify where to insert the frame. If this is
            omitted, the following heuristics are applied:

            - frame_images size is one, frame is first.

            - If size is two, frames are first and last.

            - If size is larger, frames are first, last and evenly spaced
            between.
          anyOf:
            - type: number
            - type: string
              enum:
                - first
                - last
    VideoMedia:
      type: object
      description: >-
        Contains all media inputs for video generation. Accepted fields depend
        on the model type.
      properties:
        frame_images:
          description: >-
            Array of images to guide video generation at specific timeline
            positions.
          type: array
          items:
            $ref: '#/components/schemas/VideoFrameImageInput'
        frame_videos:
          description: Array of video clips to use as starting clips.
          type: array
          items:
            $ref: '#/components/schemas/VideoRef'
        reference_images:
          description: >-
            Array of image URLs that guide the general appearance across the
            video.
          type: array
          items:
            type: string
        reference_videos:
          description: Array of reference videos.
          type: array
          items:
            $ref: '#/components/schemas/VideoRef'
        source_video:
          description: >-
            Source video to edit. Accepts a URL string or an object with a
            "video" key.
          oneOf:
            - type: string
            - $ref: '#/components/schemas/VideoRef'
        audio_inputs:
          description: >-
            Array of audio inputs. Each element accepts a URL string or an
            object with an "audio" key.
          type: array
          items:
            oneOf:
              - type: string
              - $ref: '#/components/schemas/AudioRef'
    VideoRef:
      type: object
      required:
        - video
      properties:
        video:
          type: string
          description: URL of the video.
    AudioRef:
      type: object
      required:
        - audio
      properties:
        audio:
          type: string
          description: URL of the audio.
    VideoOutputFormat:
      type: string
      enum:
        - MP4
        - WEBM
    VideoJob:
      properties:
        id:
          type: string
          description: Unique identifier for the video job.
        object:
          description: The object type, which is always video.
          const: video
        model:
          type: string
          description: The video generation model that produced the job.
        status:
          $ref: '#/components/schemas/VideoStatus'
          description: Current lifecycle status of the video job.
        created_at:
          type: number
          description: Unix timestamp (seconds) for when the job was created.
        completed_at:
          type: number
          description: Unix timestamp (seconds) for when the job completed, if finished.
        size:
          type: string
          description: The resolution of the generated video.
        seconds:
          type: string
          description: Duration of the generated clip in seconds.
        error:
          description: Error payload that explains why generation failed, if applicable.
          type: object
          properties:
            code:
              type: string
            message:
              type: string
          required:
            - message
        outputs:
          description: >-
            Available upon completion, the outputs provides the cost charged and
            the hosted url to access the video
          type: object
          properties:
            cost:
              type: integer
              description: The cost of generated video charged to the owners account.
            video_url:
              type: string
              description: URL hosting the generated video
          required:
            - cost
            - video_url
      type: object
      required:
        - id
        - model
        - status
        - size
        - seconds
        - created_at
      title: Video job
      description: Structured information describing a generated video job.
    ContainerStatus:
      properties:
        finishedAt:
          description: >-
            FinishedAt is the timestamp when the container finished execution
            (if terminated)
          type: string
        message:
          description: >-
            Message provides a human-readable message with details about the
            container's status
          type: string
        name:
          description: Name is the name of the container
          type: string
        reason:
          description: >-
            Reason provides a brief machine-readable reason for the container's
            current status
          type: string
        startedAt:
          description: StartedAt is the timestamp when the container started execution
          type: string
        status:
          description: >-
            Status is the current state of the container (e.g., "Running",
            "Terminated", "Waiting")
          type: string
      type: object
    SignedURLResponse:
      properties:
        url:
          type: string
      type: object
    CreateDeploymentRequest:
      properties:
        args:
          description: >-
            Args overrides the container's CMD. Provide as an array of arguments
            (e.g., ["python", "app.py"])
          items:
            type: string
          type: array
        autoscaling:
          description: >-
            Autoscaling configuration. Example: {"metric":
            "QueueBacklogPerWorker", "target": 1.01} to scale based on queue
            backlog. Omit or set to null to disable autoscaling
          oneOf:
            - $ref: '#/components/schemas/HTTPAutoscalingConfig'
            - $ref: '#/components/schemas/QueueAutoscalingConfig'
            - $ref: '#/components/schemas/CustomMetricAutoscalingConfig'
        command:
          description: >-
            Command overrides the container's ENTRYPOINT. Provide as an array
            (e.g., ["/bin/sh", "-c"])
          items:
            type: string
          type: array
        cpu:
          description: >-
            CPU is the number of CPU cores to allocate per container instance
            (e.g., 0.1 = 100 milli cores)
          minimum: 0.1
          type: number
        description:
          description: >-
            Description is an optional human-readable description of your
            deployment
          type: string
        environment_variables:
          description: >-
            EnvironmentVariables is a list of environment variables to set in
            the container. Each must have a name and either a value or
            value_from_secret
          items:
            $ref: '#/components/schemas/EnvironmentVariable'
          type: array
        gpu_count:
          description: >-
            GPUCount is the number of GPUs to allocate per container instance.
            Defaults to 0 if not specified
          type: integer
        gpu_type:
          description: GPUType specifies the GPU hardware to use (e.g., "h100-80gb").
          enum:
            - h100-80gb
            - h100-40gb-mig
            - h200-140gb
            - b200-192gb
          type: string
        health_check_path:
          description: >-
            HealthCheckPath is the HTTP path for health checks (e.g.,
            "/health"). If set, the platform checks this endpoint to determine
            container health.
          type: string
        image:
          description: Image is the container image to deploy from registry.together.ai.
          type: string
        max_replicas:
          description: >-
            MaxReplicas is the maximum number of container instances. Defaults
            to MinReplicas if not set.
          type: integer
        memory:
          description: >-
            Memory is the amount of RAM to allocate per container instance in
            GiB (e.g., 0.5 = 512MiB)
          maximum: 1000
          type: number
        min_replicas:
          description: >-
            MinReplicas is the minimum number of container instances to run.
            Defaults to 1 if not specified
          type: integer
        name:
          description: >-
            Name is the unique identifier for your deployment. Must contain only
            alphanumeric characters, underscores, or hyphens (1-100 characters)
          maxLength: 100
          minLength: 1
          type: string
        port:
          description: >-
            Port is the container port your application listens on (e.g., 8080
            for web servers). Required if your application serves traffic
          maximum: 65535
          minimum: 1
          type: integer
        storage:
          description: >-
            Storage is the amount of ephemeral disk storage to allocate per
            container instance (e.g., 10 = 10GiB)
          maximum: 400
          type: integer
        termination_grace_period_seconds:
          description: >-
            TerminationGracePeriodSeconds is the time in seconds to wait for
            graceful shutdown before forcefully terminating the replica
          type: integer
        volumes:
          description: >-
            Volumes is a list of volume mounts to attach to the container. Each
            mount must reference an existing volume by name
          items:
            $ref: '#/components/schemas/VolumeMount'
          type: array
      required:
        - gpu_type
        - image
        - name
      type: object
    CreateSecretRequest:
      properties:
        description:
          description: >-
            Description is an optional human-readable description of the
            secret's purpose (max 500 characters)
          maxLength: 500
          type: string
        name:
          description: >-
            Name is the unique identifier for the secret. Can contain
            alphanumeric characters, underscores, hyphens, forward slashes, and
            periods (1-100 characters)
          maxLength: 100
          minLength: 1
          type: string
        project_id:
          description: >-
            ProjectID is ignored - the project is automatically determined from
            your authentication
          type: string
        value:
          description: >-
            Value is the sensitive data to store securely (e.g., API keys,
            passwords, tokens). Encrypted at rest.
          minLength: 1
          type: string
      required:
        - name
        - value
      type: object
    CreateVolumeRequest:
      properties:
        content:
          allOf:
            - $ref: '#/components/schemas/VolumeContentRequest'
          description: Content specifies the content configuration for this volume
        name:
          description: Name is the unique identifier for the volume within the project
          maxLength: 100
          minLength: 1
          type: string
        type:
          allOf:
            - $ref: '#/components/schemas/VolumeType'
          description: Type is the volume type (currently only "readOnly" is supported)
      required:
        - content
        - name
        - type
      type: object
    DeploymentListResponse:
      properties:
        data:
          description: Data is the array of deployment items
          items:
            $ref: '#/components/schemas/DeploymentResponseItem'
          type: array
        object:
          description: The object type, which is always `list`.
          const: list
      type: object
    DeploymentLogs:
      properties:
        lines:
          items:
            type: string
          type: array
      type: object
    DeploymentResponseItem:
      properties:
        args:
          description: Args are the arguments passed to the container's command
          items:
            type: string
          type: array
        autoscaling:
          description: >-
            Autoscaling contains autoscaling configuration parameters for this
            deployment. Omitted when autoscaling is disabled (nil)
          oneOf:
            - $ref: '#/components/schemas/HTTPAutoscalingConfig'
            - $ref: '#/components/schemas/QueueAutoscalingConfig'
            - $ref: '#/components/schemas/CustomMetricAutoscalingConfig'
        command:
          description: Command is the entrypoint command run in the container
          items:
            type: string
          type: array
        cpu:
          description: >-
            CPU is the amount of CPU resource allocated to each replica in cores
            (fractional value is allowed)
          type: number
        created_at:
          description: CreatedAt is the ISO8601 timestamp when this deployment was created
          type: string
          format: date-time
        description:
          description: >-
            Description provides a human-readable explanation of the
            deployment's purpose or content
          type: string
        desired_replicas:
          description: >-
            DesiredReplicas is the number of replicas that the orchestrator is
            targeting
          type: integer
        environment_variables:
          description: >-
            EnvironmentVariables is a list of environment variables set in the
            container
          items:
            $ref: '#/components/schemas/EnvironmentVariable'
          type: array
        gpu_count:
          description: >-
            GPUCount is the number of GPUs allocated to each replica in this
            deployment
          type: integer
        gpu_type:
          description: >-
            GPUType specifies the type of GPU requested (if any) for this
            deployment
          enum:
            - h100-80gb
            - h100-40gb-mig
            - h200-140gb
            - b200-192gb
          type: string
        health_check_path:
          description: >-
            HealthCheckPath is the HTTP path used for health checks of the
            application
          type: string
        id:
          description: ID is the unique identifier of the deployment
          type: string
        image:
          description: Image specifies the container image used for this deployment
          type: string
        max_replicas:
          description: >-
            MaxReplicas is the maximum number of replicas to run for this
            deployment
          type: integer
        memory:
          description: >-
            Memory is the amount of memory allocated to each replica in GiB
            (fractional value is allowed)
          type: number
        min_replicas:
          description: >-
            MinReplicas is the minimum number of replicas to run for this
            deployment
          type: integer
        name:
          description: Name is the name of the deployment
          type: string
        object:
          description: The object type, which is always `deployment`.
          const: deployment
        port:
          description: Port is the container port that the deployment exposes
          type: integer
        ready_replicas:
          description: >-
            ReadyReplicas is the current number of replicas that are in the
            Ready state
          type: integer
        replica_events:
          additionalProperties:
            $ref: '#/components/schemas/ReplicaEvent'
          description: >-
            ReplicaEvents is a mapping of replica names or IDs to their status
            events
          type: object
        status:
          allOf:
            - $ref: '#/components/schemas/DeploymentStatus'
          description: >-
            Status represents the overall status of the deployment (e.g.,
            Updating, Scaling, Ready, Failed)
          enum:
            - Updating
            - Scaling
            - Ready
            - Failed
            - ScaledToZero
        storage:
          description: >-
            Storage is the amount of storage (in MB or units as defined by the
            platform) allocated to each replica
          type: integer
        termination_grace_period_seconds:
          description: >-
            TerminationGracePeriodSeconds is the time in seconds to wait for
            graceful shutdown before forcefully terminating the replica
          type: integer
        updated_at:
          description: >-
            UpdatedAt is the ISO8601 timestamp when this deployment was last
            updated
          type: string
          format: date-time
        volumes:
          description: Volumes is a list of volume mounts for this deployment
          items:
            $ref: '#/components/schemas/VolumeMount'
          type: array
      type: object
    DeploymentStatus:
      enum:
        - Updating
        - Scaling
        - Ready
        - Failed
        - ScaledToZero
      type: string
      x-enum-varnames:
        - DeploymentStatusUpdating
        - DeploymentStatusScaling
        - DeploymentStatusReady
        - DeploymentStatusFailed
        - DeploymentStatusScaledToZero
    EnvironmentVariable:
      properties:
        name:
          description: >-
            Name is the environment variable name (e.g., "DATABASE_URL"). Must
            start with a letter or underscore, followed by letters, numbers, or
            underscores
          type: string
        value:
          description: >-
            Value is the plain text value for the environment variable. Use this
            for non-sensitive values. Either Value or ValueFromSecret must be
            set, but not both
          type: string
        value_from_secret:
          description: >-
            ValueFromSecret references a secret by name or ID to use as the
            value. Use this for sensitive values like API keys or passwords.
            Either Value or ValueFromSecret must be set, but not both
          type: string
      required:
        - name
      type: object
    HTTPAutoscalingConfig:
