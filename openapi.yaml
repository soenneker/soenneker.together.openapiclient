          const: text.completion
      required:
        - id
        - choices
        - usage
        - created
        - prompt
        - model
        - object
    CompletionStream:
      oneOf:
        - $ref: '#/components/schemas/CompletionEvent'
        - $ref: '#/components/schemas/StreamSentinel'
    CompletionEvent:
      type: object
      required:
        - data
