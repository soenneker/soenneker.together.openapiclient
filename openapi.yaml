              description: Inline placement parameters evaluated at deploy time.
              allOf:
                - $ref: '#/components/schemas/DE.InlinePlacement'
        - type: object
          x-stainless-variantName: Profile
          required:
            - profile
          properties:
            profile:
              type: string
              description: UID of a saved placement profile.
    DE.InlinePlacement:
      type: object
      properties:
        regions:
          type: array
