            type: string
          description: >-
            Regions where the deployment is allowed to run. Multiple regions
            allow best-effort replica spreading.
        constraint:
          enum:
            - ENFORCEMENT_REQUIRED
            - ENFORCEMENT_PREFERRED
          type: string
          description: How strictly the regions list is enforced.
      description: >-
