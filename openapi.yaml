  /compute/clusters/{cluster_id}/instances/{instance_id}/remediations:
    get:
      tags:
        - RemediationService
      summary: List remediations
      description: |
        Lists remediations for an instance or cluster.
      operationId: RemediationService_ListRemediations
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
        - name: instance_id
          in: path
          required: true
          schema:
            description: >
              To list remediations on a specific node, pass the node's instance
              ID.

              To list remediations for all nodes in a cluster, pass `-` as a
              wildcard for the instance ID.
            type: string
        - name: page_size
          in: query
          schema:
            description: Maximum results to return.
            type: integer
        - name: page_token
          in: query
          schema:
            description: Pagination token from previous request.
            type: string
        - name: state
          in: query
          schema:
            description: >-
              Filter by state(s). Returns remediations matching any of the
              specified states.


              - `PENDING_APPROVAL`: Awaiting approval before processing can
              begin.

              - `PENDING`: Approved and queued for processing.

              - `RUNNING`: Actively being processed.

              - `SUCCEEDED`: Successfully completed.

              - `FAILED`: Failed with an error.

              - `CANCELLED`: Cancelled by user or system.

              - `AUTO_RESOLVED`: The underlying issue was automatically resolved
              before processing.

              - `QUARANTINING`: Cordoning or preparing the host before
              remediation.

              - `QUARANTINED`: Host has been cordoned or isolated for
              remediation.
            type: array
            items:
              enum:
                - PENDING_APPROVAL
                - PENDING
                - RUNNING
                - SUCCEEDED
                - FAILED
                - CANCELLED
                - AUTO_RESOLVED
                - QUARANTINING
                - QUARANTINED
              type: string
        - name: order_by
          in: query
          schema:
            description: Order by expression.
            type: string
        - name: trigger
          in: query
          schema:
            description: >-
              Filter by trigger type(s). Returns remediations matching any of
              the specified triggers.
            type: array
            items:
              enum:
                - REMEDIATION_TRIGGER_MANUAL
                - REMEDIATION_TRIGGER_AUTOMATED
              type: string
        - name: mode
          in: query
          schema:
            description: >-
              Filter by remediation mode(s). Returns remediations matching any
              of the specified modes.
            type: array
            items:
              enum:
                - REMEDIATION_MODE_VM_ONLY
                - REMEDIATION_MODE_HOST_AWARE
                - REMEDIATION_MODE_EVICT_WITHOUT_REPLACEMENT
                - REMEDIATION_MODE_REBOOT_VM
                - REMEDIATION_MODE_HOST_POWER_CYCLE
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRemediationsResponse'
    post:
      tags:
        - RemediationService
      description: >-
        Creates a new remediation for an instance.


        Remediations created via the API goes directly to PENDING state.


        Our system may trigger automated remediations that require approval.
        These remediations are created with PENDING_APPROVAL state.

        The user must call /approve to start the actual remediation process.

        These operations can also be rejected by calling /reject.
      operationId: RemediationService_CreateRemediation
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
        - name: instance_id
          in: path
          required: true
          schema:
            type: string
        - name: remediation_id
          in: query
          schema:
            description: Client-specified ID for idempotency.
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Remediation'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Remediation'
  /compute/clusters/{cluster_id}/instances/{instance_id}/remediations/{remediation_id}:
    get:
      tags:
        - RemediationService
      description: >-
        Retrieve the status of a specific remdiation on a specific instance in a
        specific cluster.
      operationId: RemediationService_GetRemediation
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
        - name: instance_id
          in: path
          required: true
          schema:
            type: string
        - name: remediation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Remediation'
  /compute/clusters/{cluster_id}/instances/{instance_id}/remediations/{remediation_id}/approve:
    post:
      tags:
        - RemediationService
      description: |
        Approves a pending remediation.

        Only remediations with state PENDING_APPROVAL can be approved.

        On APPROVE: state changes to PENDING and the remediation process begins.
        The reviewed_by, review_time, and review_comment fields are populated
        on the remediation after approval.
      operationId: RemediationService_ApproveRemediation
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
        - name: instance_id
          in: path
          required: true
          schema:
            type: string
        - name: remediation_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveRemediationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Remediation'
  /compute/clusters/{cluster_id}/instances/{instance_id}/remediations/{remediation_id}/cancel:
    post:
      tags:
        - RemediationService
      description: |
        Cancels a pending remediation.

        Only remediations in PENDING_APPROVAL or PENDING state can be cancelled.
      operationId: RemediationService_CancelRemediation
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            description: The cluster ID.
            type: string
        - name: instance_id
          in: path
          required: true
          schema:
            description: The instance ID.
            type: string
        - name: remediation_id
          in: path
          required: true
          schema:
            description: The remediation ID.
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Remediation'
  /compute/clusters/{cluster_id}/instances/{instance_id}/remediations/{remediation_id}/reject:
    post:
      tags:
        - RemediationService
      description: |
        Rejects a pending remediation.

        Only remediations with state PENDING_APPROVAL can be rejected.

        On REJECT: state changes to CANCELLED.
        The reviewed_by, review_time, and review_comment fields are populated
        on the remediation after rejection.
      operationId: RemediationService_RejectRemediation
      parameters:
        - name: cluster_id
          in: path
          required: true
          schema:
            type: string
        - name: instance_id
          in: path
          required: true
          schema:
            type: string
        - name: remediation_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentBody'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Remediation'
  /compute/passive_health_check_alerts:
    get:
      tags:
        - HealthCheckService
      summary: List passive health check alerts
      description: >-
        Lists passive health check alerts. Filters combine across axes; empty
        values skip that axis.
      operationId: HealthCheckService_ListPassiveHealthCheckAlerts
      parameters:
        - name: intent_id
          in: query
          schema:
            description: Remediation intent ID to filter by.
            type: string
        - name: instance_id
          in: query
          schema:
            description: Instance ID to filter by.
            type: string
        - name: cluster_id
          in: query
          schema:
            description: >-
              Optional instance cluster ID to filter by. Required for non-admin
              callers.
            type: string
        - name: page_size
          in: query
          schema:
            description: Max number of results to return.
            default: 50
            type: integer
        - name: page_token
          in: query
          schema:
            description: Opaque pagination token from the previous response.
            type: string
        - name: status
          in: query
          schema:
            description: Lifecycle filter. Omit to return firing alerts.
            enum:
              - PHC_ALERT_STATUS_FIRING
              - PHC_ALERT_STATUS_RESOLVED
              - PHC_ALERT_STATUS_ALL
            type: string
        - name: severity_filter
          in: query
          schema:
            description: >-
              Severity tiers to include. Omit or pass an empty array to include
              all severities.
            type: array
            items:
              enum:
                - PHC_SEVERITY_INFO
                - PHC_SEVERITY_WARNING
                - PHC_SEVERITY_CRITICAL
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPassiveHealthCheckAlertsResponse'
  /whoami:
    get:
      tags:
        - Account
      summary: Get API key identity
      description: >
        Returns identity information about the authenticated API key. Useful for
        confirming which project and organization a key is scoped to, and for
        obtaining the project slug used to compose the `model` value
        (`<project_slug>/<endpoint_slug>`) in dedicated endpoint inference
        calls.

        Requires a Bearer API key in the `Authorization` header. Cookie,
        session, and SLS JWT credentials are not accepted.
      operationId: whoami
      x-codeSamples:
        - lang: Python
          label: Together AI SDK (v2)
          source: |
            from together import Together

            client = Together()
            identity = client.whoami()
            print(identity)
        - lang: TypeScript
          label: Together AI SDK (TypeScript)
          source: |
            import Together from "together-ai";

            const client = new Together();
            const identity = await client.whoami();
            console.log(identity);
        - lang: JavaScript
          label: Together AI SDK (JavaScript)
          source: |
            import Together from "together-ai";

            const client = new Together();
            const identity = await client.whoami();
            console.log(identity);
        - lang: Shell
          label: cURL
          source: |
            curl https://api.together.ai/v1/whoami \
                 -H "Authorization: Bearer $TOGETHER_API_KEY"
      responses:
        '200':
          description: API key identity information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhoamiResponse'
        '401':
          description: Unauthorized — missing or invalid API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      x-bearer-format: bearer
      x-default: default
  schemas:
    DE.ListPublicEndpointsResponse:
      type: object
      description: >-
        Response containing publicly discoverable endpoints and pagination
        metadata.
      required:
        - data
        - object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DE.PublicEndpoint'
          description: Endpoints visible through the public catalog.
        next_cursor:
          type: string
          description: Cursor for the next page. Null if there are no more results.
        object:
          const: list
          description: Object type. Always `list`.
    DE.PublicEndpoint:
      type: object
      description: Endpoint metadata exposed through the public endpoint catalog.
      required:
        - id
        - projectId
        - name
        - createdAt
        - updatedAt
        - visibility
      properties:
        id:
          type: string
          description: Unique endpoint identifier.
        projectId:
          type: string
          description: ID of the project that owns the endpoint.
        name:
          type: string
          description: >-
            Endpoint string in the form `<project_slug>/<endpoint_name>`, passed
            as the `model` parameter when calling inference.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the endpoint was created.
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the endpoint was last updated.
        visibility:
          const: VISIBILITY_PUBLIC
          type: string
          description: Public visibility of the endpoint.
    DE.ListEndpointsResponse:
      type: object
      description: Response containing endpoints and pagination metadata.
      required:
        - data
        - object
      properties:
        data:
          description: The list of endpoints.
          type: array
          items:
            $ref: '#/components/schemas/DE.Endpoint'
        next_cursor:
          type: string
          description: Cursor for the next page. Null if there are no more results.
        object:
          const: list
          description: Object type. Always `list`.
    DE.Endpoint:
      description: >-
        Stable inference entry point that groups deployments and routes requests
        among them.
      type: object
      required:
        - name
        - id
        - projectId
        - createdAt
        - updatedAt
        - etag
        - deployments
        - trafficSplit
        - visibility
        - endpointType
      properties:
        id:
          readOnly: true
          description: Unique endpoint identifier.
          type: string
        projectId:
          readOnly: true
          type: string
          description: ID of the project that owns the endpoint.
        name:
          type: string
          description: >-
            Project-qualified endpoint name in the form
            `<project_slug>/<endpoint_name>`.

            Pass this value as `model` in inference requests. Create and update
            requests

            may use either a bare endpoint name or the qualified form; a
            supplied project

            slug must match the project in the request path.
        createdAt:
          readOnly: true
          type: string
          description: Timestamp when the endpoint was created.
          format: date-time
        updatedAt:
          type: string
          description: Output only. Timestamp when the endpoint was last updated.
          format: date-time
        etag:
          type: string
          description: |-
            Opaque version tag for optimistic concurrency control.
            Supply on update/delete to ensure consistent read-modify-write.
            If not set, the write overwrites based on current state.
        trafficSplit:
          type: array
          items:
            $ref: '#/components/schemas/DE.TrafficSplitEntry'
          description: >-
            Deployments eligible for live traffic and their capacity weights. An
            empty list leaves the endpoint unrouted.
        visibility:
          default: VISIBILITY_PRIVATE
          enum:
            - VISIBILITY_PRIVATE
            - VISIBILITY_INTERNAL
          type: string
          description: >-
            Who can discover the endpoint. `VISIBILITY_PRIVATE` restricts it to
            the project; `VISIBILITY_INTERNAL` shares it with the organization.
        endpointType:
          readOnly: true
          enum:
            - ENDPOINT_TYPE_DEDICATED
            - ENDPOINT_TYPE_SERVERLESS
          type: string
          description: Serving class of the endpoint.
        deployments:
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/DE.DeploymentSummary'
          description: >-
            Lightweight summaries of deployments under this endpoint.

            Retrieve a deployment through the endpoint's deployment API for full
            details.
        activeRolloutId:
          readOnly: true
          type: string
          description: ID of the currently active rollout, or empty if none.
    DE.DeploymentSummary:
      type: object
      description: Compact deployment status embedded in an endpoint response.
      required:
        - id
        - autoscaling
        - createdAt
        - model
        - modelId
        - name
        - state
        - trafficMode
        - estimatedEffectiveTrafficShare
      properties:
        id:
          readOnly: true
          type: string
          description: Deployment identifier.
        modelId:
          type: string
          description: Deprecated. Use `model`. Model identifier being served.
        hardware:
          readOnly: true
          type: string
          description: >-
            Hardware configuration selected by the deployment's config, such as
            its GPU type and count.
        trafficMode:
          enum:
            - TRAFFIC_MODE_LIVE
            - TRAFFIC_MODE_SHADOW
          type: string
          description: >-
            Whether the deployment serves client-visible responses or only
            mirrored shadow traffic.
        state:
          readOnly: true
          enum:
            - DEPLOYMENT_STATE_PROVISIONING
            - DEPLOYMENT_STATE_READY
            - DEPLOYMENT_STATE_SCALING
            - DEPLOYMENT_STATE_DEGRADED
            - DEPLOYMENT_STATE_FAILED
            - DEPLOYMENT_STATE_STOPPED
            - DEPLOYMENT_STATE_STOPPING
          type: string
          description: Current state of the deployment.
        name:
          readOnly: true
          type: string
          description: >-
            Inference-addressable name in the fully-qualified form

            "<project_slug>/<endpoint_name>/<deployment_name>". Pass it as the

            "model" field when calling the inference API to pin to this
            deployment.
        createdAt:
          readOnly: true
          type: string
          description: Timestamp when the deployment was created.
          format: date-time
        autoscaling:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/DE.AutoscalingResponse'
          description: Autoscaling configuration for the deployment.
        desiredReplicas:
          readOnly: true
          type: integer
          description: >-
            Number of replicas the autoscaler currently wants across all
            regions.
        readyReplicas:
          readOnly: true
          type: integer
          description: >-
            Number of replicas currently ready to serve requests across all
            regions.
        model:
          type: string
          description: >-
            Resource name of the served model in the form

            `projects/{projectId}/models/{modelId}/revisions/{revisionId}`.

            For public models, the model's owning project may differ from the
            deployment's project.
        estimatedEffectiveTrafficShare:
          readOnly: true
          type: number
          format: double
          description: >-
            Estimated fraction from 0 to 1 of endpoint traffic currently routed
            to this deployment.
    DE.TrafficSplitEntry:
      type: object
      description: >-
        Capacity weight assigned to one deployment in an endpoint's live traffic
        split.
      required:
        - deploymentId
        - weight
      properties:
        deploymentId:
          type: string
          description: ID of a deployment under the endpoint that can receive live traffic.
        weight:
          type: number
          description: >-
            Non-negative, finite weight applied to each ready replica. A
            deployment's

            effective routing capacity is `weight * readyReplicas`, and requests
            are

            distributed in proportion to that capacity. Set to `0` to remove the

            deployment from the live traffic split.
    DE.CreateEndpointRequest:
      type: object
      description: Request parameters for creating an endpoint.
      required:
        - name
      properties:
        name:
          type: string
          description: Inference-addressable endpoint name to create.
        visibility:
          default: VISIBILITY_PRIVATE
          enum:
            - VISIBILITY_PRIVATE
            - VISIBILITY_INTERNAL
          type: string
          description: >-
            Who can discover the endpoint. `VISIBILITY_PRIVATE` restricts it to
            the project; `VISIBILITY_INTERNAL` shares it with the organization.
    DE.EndpointUpdate:
      type: object
      description: Mutable endpoint fields for update requests.
      properties:
        name:
          type: string
          description: Updated endpoint string.
        etag:
          type: string
          description: >-
            Current endpoint version. The update is rejected if this value no
            longer matches.
        trafficSplit:
          type: array
          description: >-
            Replacement live traffic split. Use an empty list to stop routing
            live traffic.
          items:
            $ref: '#/components/schemas/DE.TrafficSplitEntry'
        visibility:
          default: VISIBILITY_PRIVATE
          enum:
            - VISIBILITY_PRIVATE
            - VISIBILITY_INTERNAL
          type: string
          description: >-
            Who can discover the endpoint. `VISIBILITY_PRIVATE` restricts it to
            the project; `VISIBILITY_INTERNAL` shares it with the organization.
    DE.CreateDeploymentRequest:
      type: object
      description: >-
        Configuration for creating a deployment that binds a model and immutable
        config to an endpoint.
      required:
        - name
        - autoscaling
      properties:
        name:
          type: string
          description: >-
            Name for the deployment within its endpoint. Returned as a
            fully-qualified endpoint string.
        modelId:
          type: string
          description: >-
            Deprecated. Use `model`. Model identifier to serve, accepted when
            `model` is unset.
        modelRevisionId:
          type: string
          description: >-
            Deprecated. Use `model` with a /revisions/{revisionId} segment. If
            omitted, the latest revision is resolved at creation.
        configId:
          type: string
          description: >-
            Deprecated. Use `config`. Config revision identifier to deploy,
            accepted when `config` is unset.
        model:
          type: string
          description: >-
            Model resource name in the form
            `projects/{projectId}/models/{modelId}[/revisions/{revisionId}]`.
            Omit the revision segment to pin the latest revision at creation
            time.
        autoscaling:
          allOf:
            - $ref: '#/components/schemas/DE.Autoscaling'
          description: Autoscaling configuration for the deployment.
        config:
          type: string
          description: >-
            Immutable config revision in the form
            `projects/{projectId}/configs/{configRevisionId}`. The config must
            be compatible with the model.
        enableLora:
          type: boolean
          description: Enables dynamic loading of LoRA adapters on the deployment.
        placement:
          allOf:
            - $ref: '#/components/schemas/DE.Placement'
          description: Placement policy to use when scheduling the deployment.
    DE.UpdateDeploymentRequest:
      type: object
      description: >-
        Mutable deployment settings. Use the resource-name fields or their
        deprecated ID alternatives for a model or config change, but not both.
      properties:
        name:
          type: string
          description: Updated endpoint string.
        autoscaling:
          allOf:
            - $ref: '#/components/schemas/DE.Autoscaling'
          description: Updated autoscaling configuration.
        etag:
          type: string
          description: >-
            Current deployment version. The update is rejected if this value no
            longer matches.
    DE.CreateABExperimentRequest:
      type: object
      description: >-
        Configuration for a managed live-traffic split across deployments under
        one endpoint.
      required:
        - name
        - members
      properties:
        name:
          type: string
          description: Human-readable A/B experiment name, unique within the endpoint.
        description:
          type: string
          description: Optional free-form description.
        members:
          type: array
          items:
            $ref: '#/components/schemas/DE.ABExperimentMember'
          description: >-
            Two to 20 participating deployments with exactly one control.
            Integer traffic percentages across all members must add up to 100.
    DE.UpdateABExperimentRequest:
      type: object
      description: Mutable description and traffic allocation for an A/B experiment.
      properties:
        description:
          type: string
          description: Updated free-form description.
        members:
          type: array
          items:
            $ref: '#/components/schemas/DE.ABExperimentMember'
          description: >-
            Complete replacement member set. Requires two to 20 deployments,
            exactly one control, and percentages that add up to 100.
        etag:
          type: string
          description: Opaque version tag from a prior read for optimistic concurrency.
    DE.CreateRemoteUploadSpec:
      description: Request parameters for creating a remote upload.
      type: object
      required:
        - modelId
        - remoteUrl
      properties:
        modelId:
          type: string
          description: ID of the registered model that will receive the imported files.
        remoteUrl:
          type: string
          description: Hugging Face repository URL or presigned archive URL to import.
        token:
          type: string
          description: >-
            Optional source credential used to access a private remote location.
            The value is write-only and is not returned.
    DE.ListFilesResponse:
      type: object
      required:
        - data
        - object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DE.ListFilesResponseFile'
          description: Files in the selected model revision.
        next_cursor:
          type: string
          description: Cursor for the next page. Null if there are no more results.
        object:
          const: list
        revisionId:
          type: string
          description: ID of the model revision whose files are listed.
        revisionCreatedAt:
          type: string
          format: date-time
          description: Time when the listed model revision was created.
        totalSizeBytes:
          type: string
          description: Total size of all files in the revision, in bytes.
      description: Files and aggregate size information for one model revision.
    DE.DeleteResponse:
      type: object
      properties: {}
      additionalProperties: false
      x-stainless-empty-object: true
      description: Empty response returned after a successful delete operation.
    DE.ListEndpointAccessResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/DE.AccessEntry'
          description: All principals currently granted access on the endpoint.
      description: Principals currently allowed to send inference requests to an endpoint.
    DE.ListInferenceInstanceTypesResponse:
      type: object
      description: Hardware instance types available for inference deployments.
      required:
        - data
        - object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DE.InferenceInstanceType'
          description: Instance types available for inference.
        next_cursor:
          type: string
          description: >-
            Cursor for the next page. Always null today because this catalog is
            returned in full.
        object:
          const: list
          description: Object type. Always `list`.
    DE.RevokeEndpointAccessResponse:
      type: object
      properties: {}
      description: >-
        Empty response returned after an endpoint access grant is revoked or
        confirmed absent.
    DE.ListRemoteUploadsResponse:
      type: object
      description: Remote model import jobs and pagination metadata.
      required:
        - data
        - object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DE.RemoteUpload'
          description: Remote upload jobs.
        next_cursor:
          type: string
          description: Cursor for the next page. Null if there are no more results.
        object:
          const: list
          description: Object type. Always `list`.
    DE.ListPlacementProfilesResponse:
      type: object
      description: Reusable deployment placement profiles visible to the project.
      required:
        - data
        - object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DE.PlacementProfile'
          description: Placement profiles visible in the project.
        next_cursor:
          type: string
          description: Cursor for the next page. Null if there are no more results.
        object:
          const: list
          description: Object type. Always `list`.
    DE.PlacementProfile:
      type: object
      required:
        - id
        - projectId
        - organizationId
        - name
        - preferredRegions
      properties:
        id:
          type: string
          description: Unique placement profile identifier.
        projectId:
          type: string
          description: Project that owns the placement profile.
        organizationId:
          type: string
          description: Organization that owns the placement profile.
        name:
          type: string
          description: Human-readable placement profile name.
        preferredRegions:
          type: array
          items:
            type: string
          description: Preferred deployment regions in descending priority order.
      description: >-
        Reusable ordered region preferences for scheduling a project's
        deployments.
    DE.ListRemoteUploadEventsResponse:
      type: object
      description: Status and diagnostic events for a remote model import job.
      required:
        - data
        - object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DE.RemoteUploadEvent'
          description: Events for the remote upload.
        next_cursor:
          type: string
          description: Cursor for the next page. Null if there are no more results.
        object:
          const: list
          description: Object type. Always `list`.
    DE.RevokeEndpointAccessRequest:
      type: object
      properties:
        principalType:
          type: string
          description: >-
            Type of principal to revoke. Supported values are `project`,
            `api_key`, and `organization`.
        principalId:
          type: string
          description: Identifier of the principal whose access is being revoked.
      description: Principal whose permission to call the endpoint should be revoked.
      required:
        - projectId
        - id
        - principalType
        - principalId
    DE.GrantEndpointAccessRequest:
      type: object
      properties:
        principalType:
          type: string
          description: >-
            Type of principal to grant. Supported values are `project`,
            `api_key`, and `organization`.
        principalId:
          type: string
          description: Identifier of the principal to grant access to.
      description: >-
        Principal that should be allowed to send inference requests to the
        endpoint.
      required:
        - projectId
        - id
        - principalType
        - principalId
    DE.Deployment:
      description: >-
        Serving workload that binds a model and immutable config to an endpoint
        and manages its replicas.
      type: object
      required:
        - id
        - projectId
        - endpointId
        - name
        - createdAt
        - updatedAt
        - modelId
        - modelRevisionId
        - model
        - autoscaling
        - configId
        - config
        - etag
        - hardware
        - trafficMode
        - status
      properties:
        id:
          readOnly: true
          type: string
          description: Unique deployment identifier.
        projectId:
          readOnly: true
          type: string
          description: ID of the project that owns the deployment.
        endpointId:
          type: string
          description: ID of the endpoint that contains the deployment.
        name:
          type: string
          description: >-
            Project- and endpoint-qualified deployment name in the form
            `<project_slug>/<endpoint_name>/<deployment_name>`. Pass it as
            `model` in an inference request to target this deployment directly
            instead of using the endpoint's traffic split.
        createdAt:
          readOnly: true
          type: string
          description: Timestamp when the deployment was created.
          format: date-time
        updatedAt:
          readOnly: true
          type: string
          description: Timestamp when the deployment was last updated.
          format: date-time
        modelId:
          type: string
          description: >-
            Deprecated. Use `model`. Model identifier being served, populated
            during migration.
        modelRevisionId:
          type: string
          description: >-
            Deprecated. Use `model` with a /revisions/{revisionId} segment. Pin
            to a specific model revision.
        model:
          type: string
          description: >-
            Pinned model resource in the form
            `projects/{projectId}/models/{modelId}/revisions/{revisionId}`.
        autoscaling:
          allOf:
            - $ref: '#/components/schemas/DE.AutoscalingResponse'
          description: >-
            Replica bounds, timing windows, and metrics that control horizontal
            scaling.
        configId:
          type: string
          description: >-
            Deprecated. Use `config`. Config revision identifier, populated
            during migration.
        config:
          type: string
          description: >-
            Immutable config revision in the form
            `projects/{projectId}/configs/{configRevisionId}`.
        speculatorId:
          readOnly: true
          type: string
          description: >-
            Deprecated. Use `speculator`. Speculative decoding model identifier
            derived from the deployment config.
        speculatorRevisionId:
          readOnly: true
          type: string
          description: >-
            Deprecated. Use `speculator`. ID of the speculative decoding
            draft-model revision pinned at creation time.
        speculator:
          readOnly: true
          type: string
          description: >-
            Pinned draft-model resource used for speculative decoding, in the
            same form as `model`. Omitted when speculative decoding is disabled.
        estimatedEffectiveTrafficShare:
          readOnly: true
          type: number
          format: double
          description: >-
            Estimated fraction in [0, 1] of endpoint traffic that reaches this
            deployment under the current routing configuration. Absent or
            unrouted deployments are 0.
        enableLora:
          type: boolean
          description: Whether the deployment can dynamically load LoRA adapters.
        etag:
          type: string
          description: >-
            Opaque version tag for optimistic concurrency control. Supply on
            update/delete to ensure consistent read-modify-write. If not set,
            the write overwrites based on current state.
        hardware:
          readOnly: true
          type: string
          description: >-
            Hardware selected by the deployment config, including GPU type and
            count.
        trafficMode:
          readOnly: true
          enum:
            - TRAFFIC_MODE_LIVE
            - TRAFFIC_MODE_SHADOW
          type: string
          description: >-
            Whether the deployment serves client-visible responses or only
            mirrored shadow traffic.
        runtimeInfo:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/DE.RuntimeInfo'
          description: >-
            Serving engine and feature support derived from the immutable
            config.
        desiredReplicas:
          readOnly: true
          type: integer
          description: >-
            Number of replicas the autoscaler currently wants across all
            regions.
        status:
          readOnly: true
          allOf:
            - $ref: '#/components/schemas/DE.DeploymentStatus'
          description: Current lifecycle state and observed replica counts.
        placement:
          allOf:
            - $ref: '#/components/schemas/DE.Placement'
          description: Region constraints used to schedule the deployment's replicas.
    DE.AdapterEntry:
      type: object
      description: >-
        Adapter attached to a deployment with desired revision and observed load
        state.
      required:
        - adapterModelId
        - desiredRevisionId
        - perCluster
        - etag
      properties:
        adapterModelId:
          type: string
          description: Adapter model identifier attached to the deployment.
        desiredRevisionId:
          type: string
          description: Adapter revision pinned on the deployment.
        perCluster:
          type: array
          items:
            $ref: '#/components/schemas/DE.DeploymentAdapterStatus'
          description: Per-cluster adapter load state reported by the controller.
        etag:
          type: string
          description: Row-level etag required for UpdateAdapter and RemoveAdapter.
        adapterModel:
          type: string
          description: >-
            Resource name of the adapter model, using
            projects/{projectId}/models/{adapterModelId}.
        desiredRevision:
          type: string
          description: >-
            Resource name of the adapter model revision pinned on the
            deployment, using
            projects/{projectId}/models/{adapterModelId}/revisions/{revisionId}.
    DE.DeploymentAdapterStatus:
      type: object
      description: Controller-reported load state for an adapter on one deployment cluster.
      required:
        - adapterModelId
        - clusterId
        - state
        - readyPodCount
        - failedPodCount
        - totalPodCount
      properties:
        adapterModelId:
          type: string
          description: Adapter model identifier for this status row.
        clusterId:
          type: string
          description: Cluster reporting this adapter status.
        realizedRevisionId:
          type: string
          description: Adapter revision currently loaded on pods in this cluster.
        realizedEtag:
          type: string
          description: >-
            Adapter row etag observed by the controller when it wrote this
            status.
        state:
          enum:
            - ADAPTER_LOAD_STATE_PENDING
            - ADAPTER_LOAD_STATE_LOADING
            - ADAPTER_LOAD_STATE_READY
            - ADAPTER_LOAD_STATE_REMOVING
            - ADAPTER_LOAD_STATE_FAILED
          type: string
          description: Current adapter load state in this cluster.
        reason:
          type: string
          description: Stable reason code for the current adapter state.
        message:
          type: string
          description: Human-readable details about the current adapter state.
        readyPodCount:
          type: integer
          description: Number of pods with the adapter ready to serve.
        failedPodCount:
          type: integer
          description: Number of pods that failed to load the adapter.
        totalPodCount:
          type: integer
          description: Total pods expected to report adapter load state.
        loadedAt:
          type: string
          description: Time when the adapter first reached READY in this cluster.
          format: date-time
        updatedAt:
          type: string
          description: Time when this adapter status was last updated.
          format: date-time
        adapterModel:
          type: string
          description: >-
            Resource name of the adapter model, using
            projects/{projectId}/models/{adapterModelId}.
        realizedRevision:
          type: string
          description: >-
            Resource name of the adapter model revision currently loaded in this
            cluster, using
            projects/{projectId}/models/{adapterModelId}/revisions/{revisionId}.
    DE.ListAdaptersResponse:
      type: object
      description: Response containing attached adapters and pagination metadata.
      required:
        - data
        - object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DE.AdapterEntry'
          description: Adapters attached to the deployment.
        next_cursor:
          type: string
          description: Cursor for the next page. Null if there are no more results.
        object:
          const: list
          description: Object type. Always `list`.
    DE.AddAdapterRequest:
      type: object
      description: >-
        Configuration for attaching a LoRA adapter to a deployment that has
        adapter loading enabled.
      required:
        - adapterModelId
      properties:
        adapterModelId:
          type: string
          description: Adapter model identifier to attach.
        adapterRevisionId:
          type: string
          description: >-
            Optional adapter revision to pin. If omitted, the latest revision is
            resolved at request time.
        force:
          type: boolean
          description: >-
            Whether to evict the oldest adapter if the deployment is at adapter
            capacity.
    DE.UpdateAdapterRequest:
      type: object
      description: Request body for updating an adapter.
      required:
        - adapterRevisionId
        - etag
      properties:
        adapterRevisionId:
          type: string
          description: New adapter revision to pin.
        etag:
          type: string
          description: >-
            Row-level etag from a prior AddAdapter, UpdateAdapter, GetAdapter,
            or ListAdapters response.
    DE.ListRolloutsResponse:
      type: object
      description: Response containing rollout resources and pagination metadata.
      required:
        - data
        - object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DE.Rollout'
          description: Rollouts under the endpoint.
        next_cursor:
          type: string
          description: Cursor for the next page. Null if there are no more results.
        object:
          const: list
          description: Object type. Always `list`.
    DE.CreateRolloutRequest:
      type: object
      description: >-
        Strategy, metric gates, timing, and cleanup policy for shifting traffic
        between two deployments under one endpoint.
      required:
        - sourceDeploymentId
        - targetDeploymentId
      oneOf:
        - x-stainless-variantName: Canary
          required:
            - canary
        - x-stainless-variantName: BlueGreen
          required:
            - blueGreen
        - x-stainless-variantName: Rolling
          required:
            - rolling
      properties:
        sourceDeploymentId:
          type: string
          description: Deployment that traffic shifts away from.
        targetDeploymentId:
          type: string
          description: Deployment that traffic shifts toward.
        canary:
          allOf:
            - $ref: '#/components/schemas/DE.CanaryConfig'
          description: >-
            Canary rollout strategy configuration. Mutually exclusive with
            blueGreen and rolling.
        blueGreen:
          allOf:
            - $ref: '#/components/schemas/DE.BlueGreenConfig'
          description: >-
            Blue-green rollout strategy configuration. Mutually exclusive with
            canary and rolling.
        rolling:
          allOf:
            - $ref: '#/components/schemas/DE.RollingConfig'
          description: >-
            Rolling rollout strategy configuration. Mutually exclusive with
            canary and blueGreen.
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/DE.MetricRule'
          description: Optional metric gates evaluated after each step's soak.
        stabilizationWindow:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Optional per-step soak duration before the metric gate runs.
        sourceCleanup:
          enum:
            - SOURCE_CLEANUP_POLICY_DRAIN
            - SOURCE_CLEANUP_POLICY_KEEP
          type: string
          description: Optional policy for the source deployment after completion.
        finalSourceReplicas:
          type: integer
          description: >-
            Optional final replica count for the source deployment after
            completion.
        finalTargetReplicas:
          type: integer
          description: >-
            Optional final replica count for the target deployment after
            completion.
    DE.BlueGreenConfig:
      type: object
      properties: {}
      additionalProperties: false
      x-stainless-empty-object: true
      description: >-
        Blue-green strategy configuration for a single cutover to the target
        deployment.
    DE.RollingConfig:
      type: object
      properties: {}
      additionalProperties: false
      x-stainless-empty-object: true
      description: >-
        Rolling strategy configuration for capacity-preserving batches that ramp
        target replicas up while draining source replicas.
    DE.CanaryConfig:
      type: object
      description: Canary strategy configuration for gradual traffic progression.
      required:
        - steps
      properties:
        steps:
          type: array
          items:
            $ref: '#/components/schemas/DE.RolloutStep'
          description: >-
            Required progression steps. The final step must send 100 percent
            traffic to the target.
        stepInterval:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: Optional interval between steps. Defaults to 10m if omitted.
    DE.RolloutStep:
      type: object
      description: One stage of a canary rollout progression.
      required:
        - traffic
      properties:
        traffic:
          type: integer
          description: >-
            Required percentage of traffic on the target deployment for this
            step.
        replicas:
          type: integer
          description: Optional explicit target replica count for this step.
    DE.MetricRule:
      type: object
      description: Metric gate evaluated during a rollout.
      required:
        - name
        - stat
      oneOf:
        - x-stainless-variantName: Threshold
          required:
            - thresholdCheck
        - x-stainless-variantName: Regression
          required:
            - regressionCheck
      properties:
        name:
          type: string
          description: Required metric name as exported to the observability backend.
        stat:
          enum:
            - METRIC_STAT_TYPE_AVG
            - METRIC_STAT_TYPE_MIN
            - METRIC_STAT_TYPE_MAX
            - METRIC_STAT_TYPE_PERCENTILE
          type: string
          description: Required aggregation used for the metric.
        percentile:
          type: integer
          description: >-
            Percentile value, such as 99. Set only when stat is
            METRIC_STAT_TYPE_PERCENTILE.
        thresholdCheck:
          allOf:
            - $ref: '#/components/schemas/DE.ThresholdCheck'
          description: >-
            Threshold evaluation criteria. Mutually exclusive with
            regressionCheck.
        regressionCheck:
          allOf:
            - $ref: '#/components/schemas/DE.RegressionCheck'
          description: >-
            Regression evaluation criteria. Mutually exclusive with
            thresholdCheck.
        window:
          pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
          type: string
          description: >-
            Optional query window for the metric. Defaults to the step soak
            duration.
    DE.ThresholdCheck:
      type: object
      description: >-
        Threshold criteria that fail when the target metric violates the
        configured bound.
      required:
        - value
        - operator
      properties:
        value:
          type: number
          description: Required numeric threshold value.
        operator:
          enum:
            - THRESHOLD_OPERATOR_GT
            - THRESHOLD_OPERATOR_GTE
            - THRESHOLD_OPERATOR_LT
            - THRESHOLD_OPERATOR_LTE
          type: string
          description: Required comparison operator applied to the target metric value.
    DE.RegressionCheck:
      type: object
      description: >-
        Regression criteria that fail when the target regresses against the
        source beyond a limit.
      required:
        - maxRegressionPercent
        - direction
      properties:
        maxRegressionPercent:
          type: number
          description: Required maximum allowed regression percentage.
        direction:
          enum:
            - REGRESSION_DIRECTION_HIGHER_IS_WORSE
            - REGRESSION_DIRECTION_LOWER_IS_WORSE
          type: string
          description: >-
            Required direction that indicates whether higher or lower metric
            values are worse.
    DE.PauseRolloutRequest:
      type: object
      description: >-
        Optional concurrency check and audit reason for pausing a running
        rollout.
      properties:
        etag:
          type: string
          description: Optional etag for optimistic concurrency.
        reason:
          type: string
          description: >-
            Optional human-readable reason recorded on the rollout pause
            metadata.
    DE.ResumeRolloutRequest:
      type: object
      description: Optional concurrency check for resuming a paused rollout.
      properties:
        etag:
          type: string
          description: Optional etag for optimistic concurrency.
    DE.AbortRolloutRequest:
      type: object
      description: >-
        Reason and optional concurrency check for aborting a rollout and
        restoring source traffic.
      required:
        - reason
      properties:
        reason:
          type: string
          description: Required human-readable reason recorded in the rollout audit trail.
        etag:
          type: string
          description: Optional etag for optimistic concurrency.
    DE.CancelRolloutRequest:
      type: object
      description: >-
        Reason, disposition, and optional concurrency check for canceling a
        rollout.
      required:
        - reason
      properties:
        reason:
          type: string
          description: Required human-readable reason recorded in the rollout audit trail.
        etag:
          type: string
          description: Optional etag for optimistic concurrency.
        disposition:
          enum:
            - CANCEL_DISPOSITION_FREEZE
            - CANCEL_DISPOSITION_REVERT
          type: string
          description: >-
            Optional cancel behavior. Absent defaults to freeze, which preserves
            the current traffic split; revert sends all traffic back to the
            source deployment and terminates the rollout.
    DE.PromoteRolloutRequest:
      type: object
      description: >-
        Optional concurrency check for immediately completing a rollout on its
        target deployment.
      properties:
        etag:
          type: string
          description: Optional etag for optimistic concurrency.
    DE.PauseInfo:
      type: object
      description: Pause metadata returned while a rollout is paused.
      required:
        - pausedAt
      properties:
        reason:
          type: string
          description: Human-readable reason recorded when the rollout was paused.
        pausedAt:
          type: string
          description: Timestamp when the rollout was paused.
          format: date-time
    DE.Rollout:
      type: object
      description: Public view of a rollout resource and its embedded runtime status.
      required:
        - id
        - endpointId
        - sourceDeploymentId
        - targetDeploymentId
        - strategy
        - state
        - createdAt
        - status
      properties:
        id:
          type: string
          description: Output only. Unique rollout identifier.
          readOnly: true
        endpointId:
          type: string
          description: Output only. Endpoint this rollout belongs to.
          readOnly: true
        sourceDeploymentId:
          type: string
          description: Output only. Deployment that traffic is shifting away from.
          readOnly: true
        targetDeploymentId:
          type: string
          description: Output only. Deployment that traffic is shifting toward.
          readOnly: true
        strategy:
          enum:
            - ROLLOUT_STRATEGY_TYPE_ROLLING
            - ROLLOUT_STRATEGY_TYPE_CANARY
            - ROLLOUT_STRATEGY_TYPE_BLUE_GREEN
          type: string
          description: Output only. Rollout strategy selected at creation.
          readOnly: true
        state:
          enum:
            - ROLLOUT_STATE_RUNNING
            - ROLLOUT_STATE_PAUSED
            - ROLLOUT_STATE_STABILIZING
            - ROLLOUT_STATE_ABORTING
            - ROLLOUT_STATE_COMPLETED
            - ROLLOUT_STATE_ABORTED
            - ROLLOUT_STATE_PENDING
            - ROLLOUT_STATE_SYSTEM_PAUSED
            - ROLLOUT_STATE_CANCELLING
            - ROLLOUT_STATE_CANCELED
          type: string
          description: Output only. High-level rollout lifecycle state.
          readOnly: true
        currentStep:
          type: integer
          description: >-
            Output only. Zero-based index of the current step. Unset while
            PENDING; step 0 is reported explicitly after start.
          readOnly: true
        currentTrafficPercent:
          type: integer
          description: Output only. Applied percentage of traffic on the target deployment.
          readOnly: true
        createdAt:
          type: string
          description: Output only. Timestamp when the rollout was created.
          format: date-time
          readOnly: true
        startedAt:
          type: string
          description: Output only. Timestamp when the rollout started running.
          format: date-time
          readOnly: true
        completedAt:
          type: string
          description: Output only. Timestamp when the rollout reached a terminal state.
          format: date-time
          readOnly: true
        etag:
          type: string
          description: Output only. Opaque version tag for optimistic concurrency control.
          readOnly: true
        status:
          allOf:
            - $ref: '#/components/schemas/DE.RolloutStatus'
          description: Output only. Derived runtime progress and failure details.
          readOnly: true
        pauseInfo:
          allOf:
            - $ref: '#/components/schemas/DE.PauseInfo'
          description: >-
            Output only. Why and when the rollout was paused. Set only while
            paused or system-paused.
          readOnly: true
    DE.RolloutStatus:
      type: object
      description: Derived runtime progress for a rollout.
      required:
        - totalSteps
        - steps
      properties:
        totalSteps:
          type: integer
          description: >-
            Total number of steps in the rollout progression. Always serializes
            when status is present.
        condition:
          allOf:
            - $ref: '#/components/schemas/DE.RolloutCondition'
          description: >-
            Failure detail set when the rollout pauses, system-pauses, or
            aborts.
        steps:
          type: array
          items:
            $ref: '#/components/schemas/DE.RolloutStepStatus'
          description: Per-step rollout execution summaries.
        updatedAt:
          type: string
          description: Timestamp of the most recent progress update.
          format: date-time
    DE.RolloutCondition:
      type: object
      description: Structured reason a rollout stopped progressing.
      properties:
        category:
          enum:
            - ROLLOUT_FAILURE_CATEGORY_METRIC_REGRESSION
            - ROLLOUT_FAILURE_CATEGORY_METRICS_UNAVAILABLE
            - ROLLOUT_FAILURE_CATEGORY_TARGET_NOT_READY
            - ROLLOUT_FAILURE_CATEGORY_SOURCE_NOT_DRAINED
            - ROLLOUT_FAILURE_CATEGORY_HEALTH_REGRESSION
            - ROLLOUT_FAILURE_CATEGORY_CAPACITY_EXHAUSTED
            - ROLLOUT_FAILURE_CATEGORY_ROUTING_ERROR
            - ROLLOUT_FAILURE_CATEGORY_DEPENDENCY_OUTAGE
            - ROLLOUT_FAILURE_CATEGORY_ABORTED_BY_OPERATOR
            - ROLLOUT_FAILURE_CATEGORY_INTERNAL
            - ROLLOUT_FAILURE_CATEGORY_POLICY_INFEASIBLE
            - ROLLOUT_FAILURE_CATEGORY_UNDER_SERVED
            - ROLLOUT_FAILURE_CATEGORY_ENTITLEMENT_LAPSED
          type: string
          description: Category that classifies why the rollout stopped.
        message:
          type: string
          description: Human-readable explanation for the condition.
        atStep:
          type: integer
          description: Step index where the condition arose. Step 0 serializes explicitly.
        observedAt:
          type: string
          description: Timestamp when the condition was observed.
          format: date-time
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/DE.MetricResult'
          description: Metrics observed at the failing gate, enriched with their criteria.
    DE.RolloutStepStatus:
      type: object
      description: Collapsed execution state for one rollout step.
      properties:
        stepIndex:
          type: integer
          description: >-
            Index of this step in the rollout progression. Step 0 serializes
            explicitly.
        targetTrafficPercent:
          type: integer
          description: >-
            Target traffic percentage configured for this step. Always
            serializes for recorded steps.
        state:
          enum:
            - ROLLOUT_STEP_STATE_PENDING
            - ROLLOUT_STEP_STATE_RUNNING
            - ROLLOUT_STEP_STATE_PASSED
            - ROLLOUT_STEP_STATE_FAILED
          type: string
          description: Execution state of this rollout step.
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/DE.MetricResult'
          description: Metric gate results for this step.
        startedAt:
          type: string
          description: Timestamp when this step started.
          format: date-time
        completedAt:
          type: string
          description: Timestamp when this step completed.
          format: date-time
        failureReason:
          type: string
          description: Failure reason when this step failed.
    DE.MetricResult:
      type: object
      description: Observed metric value enriched with its rollout rule and verdict.
      properties:
        name:
          type: string
          description: Metric name as exported to the observability backend.
        stat:
          enum:
            - METRIC_STAT_TYPE_AVG
            - METRIC_STAT_TYPE_MIN
            - METRIC_STAT_TYPE_MAX
            - METRIC_STAT_TYPE_PERCENTILE
          type: string
          description: Aggregation used for the metric.
        percentile:
          type: integer
          description: >-
            Percentile value, such as 99. Set only when stat is
            METRIC_STAT_TYPE_PERCENTILE.
        check:
          enum:
            - METRIC_CHECK_TYPE_THRESHOLD
            - METRIC_CHECK_TYPE_REGRESSION
          type: string
          description: Evaluation form used by the metric rule.
        sourceValue:
          type: number
          description: >-
            Observed source baseline. Set only for regression checks; a 0
            reading serializes explicitly.
        targetValue:
          type: number
          description: Observed target value. A 0 reading serializes explicitly.
        threshold:
          type: number
          description: Threshold criteria used when check is METRIC_CHECK_TYPE_THRESHOLD.
        operator:
          enum:
            - THRESHOLD_OPERATOR_GT
            - THRESHOLD_OPERATOR_GTE
            - THRESHOLD_OPERATOR_LT
            - THRESHOLD_OPERATOR_LTE
          type: string
          description: Threshold comparison operator.
        maxRegressionPercent:
          type: number
          description: >-
            Regression percentage limit used when check is
            METRIC_CHECK_TYPE_REGRESSION.
        direction:
          enum:
            - REGRESSION_DIRECTION_HIGHER_IS_WORSE
            - REGRESSION_DIRECTION_LOWER_IS_WORSE
          type: string
          description: Direction that indicates whether higher or lower values are worse.
        verdict:
          enum:
            - METRIC_VERDICT_PASS
            - METRIC_VERDICT_BREACHED
            - METRIC_VERDICT_UNAVAILABLE
          type: string
          description: Result of evaluating this metric at the gate.
    DE.ABExperiment:
      type: object
      required:
        - name
        - members
        - id
        - projectId
        - endpointId
        - createdAt
        - createdBy
        - updatedAt
        - etag
      properties:
        id:
          type: string
          description: Output only. Unique A/B experiment identifier.
        projectId:
          type: string
          description: Output only. Project that owns the parent endpoint.
        endpointId:
          type: string
          description: Output only. Endpoint this A/B experiment belongs to.
        name:
          type: string
          description: Human-readable A/B experiment name, unique within the endpoint.
        description:
          type: string
          description: Optional free-form description.
        members:
          type: array
          items:
            $ref: '#/components/schemas/DE.ABExperimentMember'
          description: >-
            Two to 20 participating deployments with exactly one control and
            percentages that add up to 100.
        createdBy:
          type: string
          description: >-
            Output only. Identifier of the principal that created the A/B
            experiment.
        createdAt:
          type: string
          description: Output only. Timestamp when the A/B experiment was created.
          format: date-time
        updatedAt:
          type: string
          description: Output only. Timestamp when the A/B experiment was last updated.
          format: date-time
        etag:
          type: string
          description: Optional opaque version tag for optimistic concurrency control.
      description: >-
        Managed cohort split that subdivides a control deployment's live traffic
        among the control and one or more variants.
    DE.ABExperimentMember:
      type: object
      properties:
        deploymentId:
          type: string
          description: Deployment under the parent endpoint.
        role:
          enum:
            - AB_EXPERIMENT_MEMBER_ROLE_CONTROL
            - AB_EXPERIMENT_MEMBER_ROLE_VARIANT
          type: string
          description: Role of this deployment within the A/B experiment.
        percent:
          type: integer
          description: >-
            Integer traffic percent in [1, 100]. Percentages across all members
            must sum to 100.
      description: Deployment participating in an A/B experiment.
      required:
        - deploymentId
        - role
        - percent
    DE.Placement:
      description: Placement controls where a deployment is scheduled.
