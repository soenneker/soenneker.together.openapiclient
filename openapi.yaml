openapi: 3.1.0
info:
  title: Together APIs
  description: The Together REST API. See https://docs.together.ai for more details.
  version: 2.0.0
  termsOfService: https://www.together.ai/terms-of-service
  contact:
    name: Together Support
    url: https://www.together.ai/contact
  license:
    name: MIT
    url: https://github.com/togethercomputer/openapi/blob/main/LICENSE
servers:
  - url: https://api.together.ai/v1
    description: Default environment for APIs
  - url: https://api-inference.together.ai/v2
    description: Optimized environment for inference
security:
  - bearerAuth: []
paths:
  /organizations/{organizationId}/endpoints:
    get:
      tags:
        - EndpointService
      summary: List organization endpoints
      description: >-
        Lists endpoints shared with every project in the specified organization.
        Project-private and public endpoints are not included.
      operationId: EndpointService_ListOrganizationEndpoints
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            description: Organization identifier.
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            description: Maximum number of results to return.
        - name: after
          in: query
          schema:
            type: string
            description: Cursor from a previous list response.
        - name: orderBy
          in: query
          schema:
            type: string
            description: >-
              Sort field for the results. Supports `created_at` or `updated_at`,
              optionally followed by `asc` or `desc`.
        - name: filter
          in: query
          schema:
            type: string
            description: >-
              Filter expression using `name`, `created_at`, or `updated_at` with
              comparison operators and AND/OR/NOT; timestamps must be RFC 3339
              strings. `name` supports substring matching with `:` and
              prefix/suffix wildcards with `*`, and must be a bare endpoint
              name.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.ListEndpointsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
  /organizations/{organizationId}/models:
    get:
      tags:
        - VolumeService
      summary: List organization models
      description: >-
        Lists custom models shared with every project in the specified
        organization. Project-private and public models are not included.
      operationId: VolumeService_ListOrganizationModels
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            description: Organization identifier.
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            description: Maximum number of results to return.
        - name: after
          in: query
          schema:
            type: string
            description: Cursor from a previous list response.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.ListModelsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
  /projects/{projectId}/configs:
    get:
      tags:
        - ConfigService
      summary: List model configurations
      description: >-
        Lists production-ready configuration revisions compatible with a
        reference model. Specify the model with `referenceModel` or the
        deprecated `referenceModelId`; if both are supplied, they must identify
        the same model. Results include public configurations and configurations
        owned by the specified project.
      operationId: ConfigService_ListProjectConfigs
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: referenceModelId
          in: query
          schema:
            type: string
            description: >-
              Deprecated. Use `referenceModel`. Reference model identifier
              filter; if both are set, they must agree.
        - name: referenceModel
          in: query
          schema:
            type: string
            description: >-
              Model resource-name filter using
              `projects/{projectId}/models/{modelId}`; alternative to
              `referenceModelId`. If both are set, they must agree.
        - name: limit
          in: query
          schema:
            type: integer
            description: Maximum number of results to return.
        - name: after
          in: query
          schema:
            type: string
            description: Cursor from a previous list response.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.ListProjectConfigsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
  /projects/{projectId}/configs/{id}:
    get:
      tags:
        - ConfigService
      summary: Get a model configuration
      description: >-
        Retrieves a model configuration revision by ID, including its runtime
        selectors and certifications.
      operationId: ConfigService_GetProjectConfig
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: id
          in: path
          required: true
          schema:
            description: Config revision identifier.
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.ModelConfig'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
  /projects/{projectId}/endpoints:
    get:
      tags:
        - EndpointService
      summary: List endpoints
      description: Lists the dedicated inference endpoints owned by the specified project.
      operationId: EndpointService_ListEndpoints
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            description: Maximum number of endpoints to return.
        - name: after
          in: query
          schema:
            type: string
            description: Cursor from a previous response.
        - name: orderBy
          in: query
          schema:
            type: string
            description: >-
              Sort field for the results. Supports `created_at` or `updated_at`,
              optionally followed by `asc` or `desc`.
        - name: filter
          in: query
          schema:
            type: string
            description: >-
              Filter expression using `name`, `created_at`, or `updated_at` with
              comparison operators and AND/OR/NOT; timestamps must be RFC 3339
              strings. `name` supports substring matching with `:` and
              prefix/suffix wildcards with `*`, and accepts a bare endpoint name
              or `<project_slug>/<endpoint_name>`.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.ListEndpointsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
    post:
      tags:
        - EndpointService
      summary: Create an endpoint
      description: >-
        Creates a stable, inference-addressable endpoint. Add one or more
        deployments and configure its traffic split before sending inference
        requests to the endpoint name.
      operationId: EndpointService_CreateEndpoint
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DE.CreateEndpointRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.Endpoint'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
  /projects/{projectId}/endpoints/{id}:
    patch:
      tags:
        - EndpointService
      summary: Update an endpoint
      description: >-
        Updates mutable endpoint fields such as its endpoint string, visibility,
        or deployment traffic split. Use `updateMask` to select fields
        explicitly and `etag` in the request body for optimistic concurrency.
      operationId: EndpointService_UpdateEndpoint
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: id
          in: path
          required: true
          schema:
            description: Endpoint identifier.
            type: string
        - name: updateMask
          in: query
          schema:
            type: string
            description: Fields to update. If not set, the fields populated are updated.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DE.EndpointUpdate'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.Endpoint'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
    get:
      tags:
        - EndpointService
      summary: Get an endpoint
      description: >-
        Retrieves an endpoint and lightweight summaries of the deployments
        attached to it.
      operationId: EndpointService_GetEndpoint
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: id
          in: path
          required: true
          schema:
            description: Endpoint identifier.
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.Endpoint'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
    delete:
      tags:
        - EndpointService
      summary: Delete an endpoint
      description: >-
        Permanently deletes an endpoint. Delete its deployments first; use
        `etag` to reject the request if the endpoint changed after it was read.
      operationId: EndpointService_DeleteEndpoint
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: id
          in: path
          required: true
          schema:
            description: Endpoint identifier.
            type: string
        - name: etag
          in: query
          schema:
            type: string
            description: >-
              Etag for optimistic concurrency. If set, the delete is rejected if
              the current etag does not match.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.DeleteResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
  /projects/{projectId}/endpoints/{endpointId}/deployments:
    get:
      tags:
        - DeploymentService
      summary: List deployments
      description: >-
        Lists the deployments attached to an endpoint, including their model,
        configuration, scaling settings, placement, and current status.
      operationId: DeploymentService_ListDeployments
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: ID of the project that owns the endpoint.
            type: string
        - name: endpointId
          in: path
          required: true
          schema:
            description: ID of the endpoint whose deployments are listed.
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            description: Maximum number of deployments to return. Max 500, defaults to 50.
        - name: after
          in: query
          schema:
            type: string
            description: Cursor from a previous deployment list response.
        - name: orderBy
          in: query
          schema:
            type: string
            description: >-
              Sort field for the results. Supports `created_at` or `updated_at`,
              optionally followed by `asc` or `desc`.
        - name: filter
          in: query
          schema:
            type: string
            description: >-
              Filter expression using `name`, `state`, `model`, `created_at`, or
              `updated_at` with comparison operators and AND/OR/NOT; `state`
              takes a DeploymentState enum name and `model` takes a model
              resource name. `name` supports substring matching with `:` and
              prefix/suffix wildcards with `*`, and accepts a bare deployment
              name or `<project_slug>/<endpoint_name>/<deployment_name>`.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.ListDeploymentsResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
    post:
      tags:
        - DeploymentService
      summary: Create a deployment
      description: >-
        Creates a model deployment under an endpoint. The deployment provisions
        asynchronously; monitor its status before routing live traffic to it.
      operationId: DeploymentService_CreateDeployment
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: ID of the project that owns the endpoint.
            type: string
        - name: endpointId
          in: path
          required: true
          schema:
            description: ID of the endpoint that will contain the deployment.
            type: string
        - name: validateOnly
          in: query
          schema:
            type: boolean
            description: >-
              When true, validates the request without creating or provisioning
              a deployment.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DE.CreateDeploymentRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.Deployment'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
  /projects/{projectId}/endpoints/{endpointId}/deployments/{id}:
    patch:
      tags:
        - DeploymentService
      summary: Update a deployment
      description: >-
        Updates mutable deployment fields such as its model, configuration,
        autoscaling bounds, or LoRA support. Changes that affect serving may
        trigger asynchronous reprovisioning.
      operationId: DeploymentService_UpdateDeployment
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: endpointId
          in: path
          required: true
          schema:
            description: Endpoint identifier.
            type: string
        - name: id
          in: path
          required: true
          schema:
            description: Deployment identifier.
            type: string
        - name: updateMask
          in: query
          schema:
            type: string
            description: >-
              Fields to update. If not set, the fields populated on `deployment`
              are updated.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DE.UpdateDeploymentRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.Deployment'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
    get:
      tags:
        - DeploymentService
      summary: Get a deployment
      description: >-
        Retrieves a deployment's desired configuration, placement, runtime
        information, and current provisioning status.
      operationId: DeploymentService_GetDeployment
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: endpointId
          in: path
          required: true
          schema:
            description: Endpoint identifier.
            type: string
        - name: id
          in: path
          required: true
          schema:
            description: Deployment identifier.
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.Deployment'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
    delete:
      tags:
        - DeploymentService
      summary: Delete a deployment
      description: >-
        Permanently deletes a deployment from its endpoint. Remove the
        deployment from live traffic first; use `etag` to reject the request if
        it changed after it was read.
      operationId: DeploymentService_DeleteDeployment
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: endpointId
          in: path
          required: true
          schema:
            description: Endpoint identifier.
            type: string
        - name: id
          in: path
          required: true
          schema:
            description: Deployment identifier.
            type: string
        - name: etag
          in: query
          schema:
            type: string
            description: >-
              Etag for optimistic concurrency. If set, the delete is rejected if
              the current etag does not match.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.DeleteResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
  /projects/{projectId}/endpoints/{endpointId}/deployments/{deploymentId}/adapters:
    get:
      tags:
        - DeploymentService
      summary: List deployment adapters
      description: >-
        Lists LoRA adapters attached to a deployment with per-cluster load
        state.
      operationId: DeploymentService_ListAdapters
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: endpointId
          in: path
          required: true
          schema:
            description: Endpoint identifier.
            type: string
        - name: deploymentId
          in: path
          required: true
          schema:
            description: Deployment identifier.
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            description: Maximum number of adapters to return.
        - name: after
          in: query
          schema:
            type: string
            description: Cursor from a previous adapter list response.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.ListAdaptersResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
    post:
      tags:
        - DeploymentService
      summary: Add a deployment adapter
      description: >-
        Attaches a LoRA adapter to a deployment. If the deployment is at adapter
        capacity, force can evict the oldest adapter.
      operationId: DeploymentService_AddAdapter
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: endpointId
          in: path
          required: true
          schema:
            description: Endpoint identifier.
            type: string
        - name: deploymentId
          in: path
          required: true
          schema:
            description: Deployment identifier.
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DE.AddAdapterRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.AdapterEntry'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
  /projects/{projectId}/endpoints/{endpointId}/deployments/{deploymentId}/adapters/{id}:
    get:
      tags:
        - DeploymentService
      summary: Get a deployment adapter
      description: Gets an attached adapter and its per-cluster load state.
      operationId: DeploymentService_GetAdapter
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: endpointId
          in: path
          required: true
          schema:
            description: Endpoint identifier.
            type: string
        - name: deploymentId
          in: path
          required: true
          schema:
            description: Deployment identifier.
            type: string
        - name: id
          in: path
          required: true
          schema:
            description: Adapter model identifier.
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.AdapterEntry'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
    delete:
      tags:
        - DeploymentService
      summary: Remove a deployment adapter
      description: >-
        Detaches an adapter from a deployment using its row-level etag for
        optimistic concurrency.
      operationId: DeploymentService_RemoveAdapter
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: endpointId
          in: path
          required: true
          schema:
            description: Endpoint identifier.
            type: string
        - name: deploymentId
          in: path
          required: true
          schema:
            description: Deployment identifier.
            type: string
        - name: id
          in: path
          required: true
          schema:
            description: Adapter model identifier.
            type: string
        - name: etag
          in: query
          required: true
          schema:
            type: string
            description: >-
              Adapter etag from a previous add, update, get, or list response.
              The removal is rejected if the adapter changed after that
              response.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.DeleteResponse'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
    patch:
      tags:
        - DeploymentService
      summary: Update a deployment adapter
      description: >-
        Updates the pinned revision of an attached adapter using its row-level
        etag for optimistic concurrency.
      operationId: DeploymentService_UpdateAdapter
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: endpointId
          in: path
          required: true
          schema:
            description: Endpoint identifier.
            type: string
        - name: deploymentId
          in: path
          required: true
          schema:
            description: Deployment identifier.
            type: string
        - name: id
          in: path
          required: true
          schema:
            description: Adapter model identifier.
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DE.UpdateAdapterRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DE.AdapterEntry'
        default:
          description: Default error response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorData'
  /projects/{projectId}/endpoints/{endpointId}/rollouts:
    get:
      tags:
        - RolloutService
      summary: List endpoint rollouts
      description: >-
        Lists rollout histories for an endpoint. Use
        `filter=ROLLOUT_FILTER_ACTIVE` to return only the active rollout, if one
        exists.
      operationId: RolloutService_ListRollouts
      servers:
        - url: https://api.together.ai/v2
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            description: Project identifier.
            type: string
        - name: endpointId
          in: path
          required: true
          schema:
            description: Endpoint identifier.
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            description: Maximum number of rollouts to return. Max 500, defaults to 50.
        - name: after
          in: query
          schema:
            type: string
            description: Cursor from a previous rollout list response.
        - name: filter
          in: query
          schema:
            enum:
              - ROLLOUT_FILTER_ACTIVE
              - ROLLOUT_FILTER_TERMINAL
            type: string
            description: >-
              Narrow results to active or terminal rollouts. Omit to list all
              rollouts.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
